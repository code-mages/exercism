        Вы создали <strong>PR#%{pr_number}</strong> в <strong>%{repo}</strong>: %{pr_title}
    code_review:
      1: >
        Вы проверили <strong>PR#%{pr_number}</strong> в <strong>%{repo}</strong>: %{pr_title}
    code_merge:
      1: >
        Вы влили <strong>PR#%{pr_number}</strong> в <strong>%{repo}</strong>: %{pr_title}
    mentored:
      1: >
        Вы наставляли <strong>%{student_handle}</strong> по упражнению <strong>%{exercise_title}</strong> в треке <strong>%{track_title}</strong>
    published_solution:
      1: >
        Вы опубликовали своё решение упражнения <strong>%{exercise_title}</strong> в треке <strong>%{track_title}</strong>
    issue_author:
      1: >
        Вы открыли <strong>issue#%{issue_number}</strong> в <strong>%{repo}</strong>: %{issue_title}
    arbitrary:
      1: >
        %{reason}
    automation_feedback_author:
      1: >
        Вы написали отзыв для автоматизации по упражнению <strong>%{exercise_title}</strong>
    automation_feedback_editor:
      1: >
        Вы отредактировали отзыв для автоматизации по упражнению <strong>%{exercise_title}</strong>
