ru:
  user_reputation_tokens:
    exercise_author:
      1: >
        Вы создали упражнение <strong>%{exercise_title}</strong>
    exercise_contribution:
      1: >
        Вы внесли вклад в упражнение <strong>%{exercise_title}</strong>
    concept_author:
      1: >
        Вы создали концепцию <strong>%{concept_name}</strong>
    concept_contribution:
      1: >
        Вы внесли вклад в концепцию <strong>%{concept_name}</strong>
    exercise_article_author:
      1: >
        Вы написали статью <strong>%{article_title}</strong> для упражнения <strong>%{exercise_title}</strong>
    exercise_article_contribution:
      1: >
        Вы внесли вклад в статью <strong>%{article_title}</strong> для упражнения <strong>%{exercise_title}</strong>
    exercise_approach_author:
      1: >
        Вы написали подход <strong>%{approach_title}</strong> для упражнения <strong>%{exercise_title}</strong>
    exercise_approach_contribution:
      1: >
        Вы внесли вклад в подход <strong>%{approach_title}</strong> для упражнения <strong>%{exercise_title}</strong>
    exercise_approach_introduction_author:
      1: >
        Вы написали введение к подходам для упражнения <strong>%{exercise_title}</strong>
    exercise_approach_introduction_contribution:
