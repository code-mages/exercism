en:
  docs:
    index:
      meta_title: Exercism's Docs
      meta_description:
        Our docs on how to use and contribute to Exercism. All your
        Exercism-related questions should be answered here.
      welcome_heading: Welcome to Exercism's docs 👋
      welcome_subtitle: Find out everything you need to know about using and
        contributing to Exercism.
      using_exercism:
        heading: Using Exercism
        paragraph_html:
          Learn how to make the make the most from your time on Exercism.
          Find answers to all your questions, understand how to make the most
          out of mentoring, and discover how to be a great Exercism citizen.
        get_started_button: Get started
      building_exercism:
        heading: Building Exercism
        paragraph:
          Our comprehensive docs on building Exercism. Discover everything you
          need to know about how to contribute to tracks, including guides,
          specs and explanations.
        learn_more_link: Learn More
      mentoring:
        heading: Mentoring
        paragraph:
          Understand and master the art of mentoring on Exercism. Our docs
          explain how to start your first session, how to give great feedback,
          and how to use the mentoring interface.
        learn_more_link: Learn More
      community:
        heading: Community
        paragraph:
          Understand how our community works, the different roles people have
          and how you can join. Learn how to be a positive contributor and great
          community member.
        learn_more_link: Learn More
      track_specific_docs_heading: And, of course, track-specific docs
ru:
  docs:
    index:
      meta_title: Документация Exercism
      meta_description:
        Наша документация о том, как использовать Exercism и вносить в него
        вклад. Здесь вы найдёте ответы на все вопросы, связанные с Exercism.
      welcome_heading: Добро пожаловать в документацию Exercism 👋
      welcome_subtitle: Узнайте всё, что нужно знать об использовании Exercism и
        участии в его развитии.
      using_exercism:
        heading: Использование Exercism
        paragraph_html:
          Узнайте, как получить максимум пользы от времени, проведённого на
          Exercism. Найдите ответы на все свои вопросы, поймите, как извлечь
          максимум из менторства, и узнайте, как стать образцовым участником
          Exercism.
        get_started_button: Начать
      building_exercism:
        heading: Развитие Exercism
        paragraph:
          Наша подробная документация о развитии Exercism. Узнайте всё, что нужно
          знать о том, как вносить вклад в треки, включая руководства,
          спецификации и пояснения.
        learn_more_link: Узнать больше
      mentoring:
        heading: Менторство
        paragraph:
          Разберитесь в искусстве менторства на Exercism и овладейте им. Наша
          документация объясняет, как начать первую сессию, как давать
          качественную обратную связь и как пользоваться интерфейсом менторства.
        learn_more_link: Узнать больше
      community:
        heading: Сообщество
        paragraph:
          Узнайте, как устроено наше сообщество, какие роли есть у его участников
          и как к нему присоединиться. Научитесь быть полезным участником и
          отличным членом сообщества.
        learn_more_link: Узнать больше
      track_specific_docs_heading: И, конечно же, документация по конкретным трекам
