en:
  devise:
    passwords:
      edit:
        change_your_password:
          title: Change your password
          description:
            Choose your new password using the form below. If you don't do
            anything, your password will remain unchanged.
        new_password_label: New password
        new_password_placeholder: Enter a new password (min %{minimum_password_length} chars)
        confirm_new_password_label: Confirm new password
        confirm_new_password_placeholder: Enter your new password again
        change_my_password_button: Change my password
      new:
        forgot_your_password:
          title: Forgot your password?
          description:
            If you've forgotten your password, use the form below to request a
            link to change it. Many people who think they've forgotten their
            password originally signed in using GitHub so you may like to try
            that too.
        email_placeholder: Enter your email address
        send_instructions_button: Send instructions
ru:
  devise:
    passwords:
      edit:
        change_your_password:
          title: Смена пароля
          description:
            Задайте новый пароль с помощью формы ниже. Если вы ничего не
            сделаете, ваш пароль останется прежним.
        new_password_label: Новый пароль
        new_password_placeholder: Введите новый пароль (минимум %{minimum_password_length} символов)
        confirm_new_password_label: Подтвердите новый пароль
        confirm_new_password_placeholder: Введите новый пароль ещё раз
        change_my_password_button: Сменить пароль
      new:
        forgot_your_password:
          title: Забыли пароль?
          description:
            Если вы забыли пароль, воспользуйтесь формой ниже, чтобы запросить
            ссылку для его смены. Многие, кто думает, что забыл пароль,
            изначально входили через GitHub, так что попробуйте и этот способ.
        email_placeholder: Введите адрес электронной почты
        send_instructions_button: Отправить инструкции
