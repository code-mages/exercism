ru:
  bootcamp:
    dashboard:
      index:
        welcome_to_level: Добро пожаловать на уровень %{level_idx}!
        go_to_level: Перейти к уровню %{level_idx}
        continue_where_you_left_off: Продолжите с того места, где остановились
        exercise_in_progress: У вас есть упражнение в процессе выполнения.
        start_new_exercise: Начать новое упражнение
        new_exercise_available: У вас есть новое доступное упражнение.
        all_exercises_completed: Все упражнения выполнены 🎉
        all_exercises_completed_description:
          Поздравляем, вы выполнили все упражнения, доступные вам на данный
          момент.
        upcoming_live_sessions: Ближайшие прямые эфиры
        responsive_web_design: "Responsive Web Design:"
        responsive_web_design_time: "Понедельник, 7 июня: 9:00 UTC"
        final_live_session: Финальный прямой эфир!
        final_live_session_time: "Пятница, 11 июня: 9:00 UTC\""
        make_the_most: Используйте буткемп по максимуму
        make_the_most_description:
          Чем активнее вы участвуете во всех сферах буткемпа, тем больше
          узнаёте.
        level: Уровень %{level_idx}
        chat_on_discord: Общайтесь в Discord
        chat_on_discord_description: "Используйте эксклюзивный раздел #bootcamp на сервере Exercism в Discord, чтобы общаться с другими студентами и наставниками буткемпа."
