ru:
  bootcamp:
    projects:
      index:
        breadcrumb: Проекты
        heading: Проекты
        intro: >-
          За время буткемпа вы соберёте самые разные проекты. В каждом из них несколько упражнений, которые открываются по мере прохождения буткемпа.
          Новые проекты будут открываться по мере вашего прогресса.
