        mentoring_body: Our unique mentoring program is one of the best ways to get tips from experts!
      faqs:
        title: Frequently Asked Questions
        intro: These are the questions we get asked the most. Your question not answered here?
        ping_email: Ping us an email!
        q_start: When does the Bootcamp start?
        a_start: The first session will be on January 11th 2025 at 18:00 UTC.
        q_time: How much time will I need to spend each week on the bootcamp?
        a_time: We're aiming for about 8 hours per week (See the "What your week will look like" for more details). If you can put in an hour per day, that will be enough for you to get through the main work. If you can invest an extra few hours per week, you'll be able to also complete any more advanced exercises.
        q_join_later: Can I join Part 1 now and then sign up for the rest of the course later?
        a_join_later: Yes, you can. But it will be more expensive to sign up for Part 2 later than it is to sign up for the full course now. We recommend signing up for the full course now if you're confident you want to learn web development.
        q_group: Are there group activities and do I have to take part?
        a_group: There are no formal group activities. However, we encourage everyone to share their journey and explore programming together in our Discord server. Exploring other people's code is one of the best ways to improve your programming skills. You can choose to opt-out of the community aspects if you prefer.
        q_language: What specific programming language will be taught in Part 1?
        a_language: We'll be teaching you a special beginner-friendly version of JavaScript. We've designed it specifically to ensure you don't get bogged down by syntax or language oddities. The focus is on your learning how to code and then being able to apply that to any language, but you'll also get a big head start on JavaScript preparing you for Part 2.
        q_limit: Is there a limit to the number of students who can join the live sessions?
        a_limit: No, the sessions will be streamed online and everyone will be able to ask questions and participate. You can watch them back at any time in the future.
        q_graded: Are the exercises graded or just for practice? Is there any form of assessment?
        a_graded: Most exercises can be completed by reaching a certain objective. However, they are not graded and your code isn't assessed or marked. We will explore some (anonymised) code in the weekly sessions and discuss how it could be improved, but our philosophy is that you should be in the trenches coding, not worrying about passing tests.
        q_job_ready: Will I be job-ready by the end of the bootcamp?
        a_job_ready: A few exceptional students might be in a position where they're confident applying for junior jobs. But for most people, we'll recommend spending a few more months honing your skills before entering your first programming job. Job hunting can be tough, and the more refined your skills, the more likely you'll be to get that first job!
        q_discount: "How does the discount for %{country} work?"
        a_discount: "We understand that $%{price} is a significant amount of money in countries with currencies that are weak against the dollar. So we're offering a %{percentage}% discount to people in %{country} to ensure they can take part."
        a_discount_2: Simply click the "Enroll now" button and the discount will be automatically applied at checkout.
        q_discounts_offered: Do you offer any discounts for students, unemployed or people in countries with weak currencies?
        a_discounts_offered_html: "Yes, we do. We want to ensure as many people can benefit from this bootcamp as possible. Email %{email}, tell me your situation, and I'll see what we can do for you."
        q_nothing_received: I've signed up but not received anything.
        a_nothing_received_html: "The bootcamp starts on January 11th 2025, so you won't have access to anything until then. However, you should receive emails giving you more information. If you don't recieve those, please email %{email} and we'll check everything for you."
      legals:
        registered: is a registered
        not_for_profit: not-for-profit organisation.
