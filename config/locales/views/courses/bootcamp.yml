      faqs:
        title: Часто задаваемые вопросы
        intro: Это вопросы, которые нам задают чаще всего. Не нашли здесь ответа на свой вопрос?
        ping_email: Напишите нам!
        q_start: Когда начинается буткемп?
        a_start: Первая сессия состоится 11 января 2025 года в 18:00 UTC.
        q_time: Сколько времени в неделю мне нужно будет уделять буткемпу?
        a_time: Мы ориентируемся примерно на 8 часов в неделю (см. раздел "Как будет выглядеть ваша неделя" для подробностей). Если вы сможете уделять час в день, этого будет достаточно, чтобы пройти основную работу. Если вложите пару дополнительных часов в неделю, сможете также выполнить более продвинутые упражнения.
        q_join_later: Могу ли я записаться на Часть 1 сейчас, а на остальной курс позже?
        a_join_later: Да, можете. Но записаться на Часть 2 позже будет дороже, чем на полный курс сейчас. Мы рекомендуем записаться на полный курс сейчас, если вы уверены, что хотите изучать веб-разработку.
        q_group: Есть ли групповые активности и обязательно ли в них участвовать?
        a_group: Формальных групповых активностей нет. Однако мы призываем всех делиться своим путём и вместе исследовать программирование на нашем сервере в Discord. Изучение чужого кода - один из лучших способов улучшить навыки программирования. Вы можете отказаться от участия в сообществе, если предпочитаете.
        q_language: Какой именно язык программирования будет изучаться в Части 1?
        a_language: Мы будем учить вас специальной дружелюбной к новичкам версии JavaScript. Мы разработали её специально, чтобы вы не увязли в синтаксисе или особенностях языка. Основной упор делается на то, чтобы вы научились программировать и могли применить это к любому языку, но вы также получите хороший задел по JavaScript, подготавливающий вас к Части 2.
        q_limit: Есть ли ограничение на число студентов, которые могут присоединиться к живым сессиям?
        a_limit: Нет, сессии будут транслироваться онлайн, и каждый сможет задавать вопросы и участвовать. Вы можете пересматривать их в любое время в будущем.
        q_graded: Оцениваются ли упражнения или они только для практики? Есть ли какая-то форма аттестации?
        a_graded: Большинство упражнений можно выполнить, достигнув определённой цели. Однако они не оцениваются, и ваш код не проверяется и не ставится оценка. Мы разберём некоторый (обезличенный) код на еженедельных сессиях и обсудим, как его можно улучшить, но наша философия в том, что вы должны быть в гуще кода, а не переживать о прохождении тестов.
        q_job_ready: Буду ли я готов к работе к концу буткемпа?
        a_job_ready: Несколько исключительных студентов, возможно, будут уверенно подавать заявки на junior-позиции. Но большинству мы порекомендуем потратить ещё несколько месяцев на оттачивание навыков перед первой работой программистом. Поиск работы может быть непростым, и чем отточеннее ваши навыки, тем вероятнее вы получите первую работу!
        q_discount: "Как работает скидка для страны %{country}?"
        a_discount: "Мы понимаем, что $%{price} - значительная сумма в странах с валютами, слабыми по отношению к доллару. Поэтому мы предлагаем скидку %{percentage}% людям в стране %{country}, чтобы они могли участвовать."
        a_discount_2: Просто нажмите кнопку "Записаться", и скидка будет автоматически применена при оформлении.
        q_discounts_offered: Предлагаете ли вы скидки для студентов, безработных или людей из стран со слабой валютой?
        a_discounts_offered_html: "Да, предлагаем. Мы хотим, чтобы как можно больше людей смогли воспользоваться этим буткемпом. Напишите на %{email}, расскажите о своей ситуации, и я посмотрю, что мы можем для вас сделать."
        q_nothing_received: Я записался, но ничего не получил.
        a_nothing_received_html: "Буткемп начинается 11 января 2025 года, так что до этого у вас не будет доступа ни к чему. Однако вы должны получать письма с дополнительной информацией. Если вы их не получаете, напишите на %{email}, и мы всё для вас проверим."
