        love_to_join: I'd love for you to join us! 💙
      syllabus:
        tag: What we cover
        menu_prefix: What's on the
        menu_strong: menu?
        split_two_halves: The course is split into two halves. The first teaches Coding Fundamentals. The second (optional) part teaches Front-end Web Development.
        part1_title: Coding Fundamentals 🧑‍🔬
        part1_bubble: Part 1
        part1_intro_prefix: The first half of the course focusses on
        part1_intro_strong: building rock solid foundations.
        part1_intro_suffix: We'll cover all the core concepts in programming and give you tons of exercises and projects to practice with.
        part1_li1_strong: Build a solid understanding
        part1_li1_text: of core programming principles, including flow control, conditionals, data types, functions, and much more, using a beginner-friendly version of JavaScript.
        part1_li2_strong: Gain the confidence
        part1_li2_text: to put your knowledge into practice, being able to solve a wide variety of problems, using the right concept at the right time.
        part1_li3_strong: Develop the Coder's Mind.
        part1_li3_text: You'll notice that your critical thinking, problem solving, and logic skills are all improving.
        part1_duration: Takes 12-20 weeks
        part2_title: Front-End Web Development 🧑‍💻
        part2_bubble: Part 2
        part2_intro_prefix: From April to June, we'll build on the fundamentals and look at
        part2_intro_strong: front-end web development.
        part2_intro_suffix: You'll gain the skills you need to build beautiful, interactive websites and kickstart your career.
        part2_li1_strong: Get comfortable with JavaScript.
        part2_li1_text: We'll build on your knowledge from Part 1 by looking at JavaScript programming techniques essential for web development.
        part2_li2_strong: Learn HTML and CSS.
        part2_li2_text: These two languages are the other fundamentals of web development. You'll learn both and use them to create beautiful websites.
        part2_li3_strong: Learn Visual Studio Code and Git.
        part2_li3_text: Master these important tools, and how to use them to make your life easier.
        part2_li4_strong: Build a portfolio of projects.
        part2_li4_text: Create projects to showcase to potential employers while practicing your skills.
        part2_duration: Takes ~12 weeks
      levels:
        heading_prefix: The
        heading_strong: 10 Levels
        heading_suffix: of Coding Fundamentals
        sideheading: Students normally take 1-2 weeks per level.
        intro: From day one you'll be building fun things. You'll start by drawing, then animating, then making games, then building intelligence into your programs. Every level has lots of fun challenges!
        few_things: Here are just a few of the fun things you'll make! 👇
        level1_prefix: In
