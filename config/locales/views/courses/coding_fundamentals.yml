      exercism:
        heading: What makes Exercism special?
        intro_prefix: Exercism is a
        nonprofit: longstanding nonprofit
        helped_over: that's helped over
        two_million: 2 million people
        level_up: level-up their coding skills.
        students_title: Exercism students
        students_text: We've grown entirely by word of mouth. Good friends tell their friends about Exercism!
        testimonials_title: Testimonials
        testimonials_text: We've been one of the most trusted resources for coding education for over a decade.
        exercises_title: Exercises Solved
        exercises_text: Our exercises are trusted by the coding community as the perfect way to level up!
        mentoring_title: Mentoring Sessions
        mentoring_text: Our unique mentoring program is one of the best ways to get tips from experts!
      faqs:
        heading: Frequently Asked Questions
        intro: These are the questions we get asked the most. Your question not answered here?
        ping_email: Ping us an email!
        q_access: When will I get access and how long for?
        a_access_1: You gain access to the full Coding Fundamentals course as soon as your pay. You'll have access for life.
        a_access_2: The Front-End Fundamentals course will run live from April 26th till mid-July. You'll also have access to the course materials beyond that date for life.
        q_time: How much time will I need to spend each week on the course?
        a_time: You can spend as long or as little as you like. In general, people who spend an 1-2 hours per day on the course get through each Level in 1-2 weeks.
        q_hard: How hard is the course? How smart do I need to be?
        a_hard_1: The course is designed to be accessible to everyone, regardless of your background. We don't believe you need to be "smart" to learn to code. But you do need to put in the effort and be willing to be challenged.
        a_hard_2: But if you put in the effort, ask for help when you get stuck, and embrace the challenge, you'll be amazed at how far you can go in a short time.
        q_group: Are there group activities and do I have to take part?
        a_group: There are no formal group activities. However, we encourage everyone to share their journey and explore programming together in our Discord server. Chatting about code is one of the best ways to improve your programming skills. Many of our students get together (virtually) for unofficial study groups - so you might like to join some of them! You can choose to opt-out of the community aspects if you prefer.
        q_language: What specific programming language is taught.
        a_language_1: We're teaching you a special beginner-friendly language called JikiScript. It's a full, normal programming language, but it's been designed specifically to ensure you don't get bogged down by syntax or language oddities.
        a_language_2: Once you've learnt JikiScript and understand the core programming concepts, you'll find it straight-forward to learn Python, JavaScript, or any other language using Exercism's free courses.
        q_graded: Are the exercises graded or just for practice? Is there any form of assessment?
        a_graded: Most exercises can be completed by reaching a certain objective. However, they are not graded and your code isn't assessed or marked. We will explore some (anonymised) code in the weekly sessions and discuss how it could be improved, but our philosophy is that you should be in the trenches coding, not worrying about passing tests.
        q_nothing: I've signed up but not received anything.
        a_nothing_html: Firstly, please check your spam. If you still can't find anything, please email %{email} and we'll check everything for you!
      legals:
        registered: is a registered
        nonprofit: not-for-profit organisation.
