        exercises_text: Нашим упражнениям доверяет сообщество программистов как идеальному способу повысить уровень!
        mentoring_title: Сессий менторства
        mentoring_text: Наша уникальная программа менторства - один из лучших способов получить советы от экспертов!
      faqs:
        heading: Часто задаваемые вопросы
        intro: Это вопросы, которые нам задают чаще всего. Не нашли ответа на свой вопрос?
        ping_email: Напишите нам на почту!
        q_access: Когда я получу доступ и на какой срок?
        a_access_1: Вы получаете доступ к полному курсу основ программирования сразу после оплаты. Доступ останется у вас навсегда.
        a_access_2: Курс основ фронтенда будет проходить вживую с 26 апреля до середины июля. У вас также останется доступ к материалам курса после этой даты навсегда.
        q_time: Сколько времени в неделю мне нужно будет тратить на курс?
        a_time: Вы можете тратить столько времени, сколько захотите. В целом люди, которые уделяют курсу 1-2 часа в день, проходят каждый уровень за 1-2 недели.
        q_hard: Насколько сложен курс? Насколько умным мне нужно быть?
        a_hard_1: Курс разработан так, чтобы быть доступным для каждого, независимо от вашего бэкграунда. Мы не считаем, что нужно быть "умным", чтобы научиться программировать. Но вам нужно приложить усилия и быть готовым к вызовам.
        a_hard_2: Но если вы приложите усилия, попросите о помощи, когда застрянете, и примете вызов, вы удивитесь, как далеко можно продвинуться за короткое время.
        q_group: Есть ли групповые занятия и обязательно ли в них участвовать?
        a_group: Формальных групповых занятий нет. Однако мы поощряем всех делиться своим путём и вместе исследовать программирование на нашем сервере в Discord. Обсуждение кода - один из лучших способов улучшить навыки программирования. Многие наши студенты собираются (виртуально) для неофициальных учебных групп, так что вы можете к ним присоединиться! Если хотите, вы можете отказаться от участия в жизни сообщества.
        q_language: Какой именно язык программирования преподаётся.
        a_language_1: Мы обучаем вас особому дружелюбному к новичкам языку под названием JikiScript. Это полноценный, обычный язык программирования, но он специально разработан так, чтобы вы не увязали в синтаксисе или языковых странностях.
        a_language_2: После того как вы изучите JikiScript и поймёте ключевые концепции программирования, вам будет несложно освоить Python, JavaScript или любой другой язык с помощью бесплатных курсов Exercism.
        q_graded: Упражнения оцениваются или они только для практики? Есть ли какая-то форма оценивания?
        a_graded: Большинство упражнений можно выполнить, достигнув определённой цели. Однако они не оцениваются, и ваш код не проверяется и не оценивается. Мы разберём часть (обезличенного) кода на еженедельных сессиях и обсудим, как его можно улучшить, но наша философия в том, что вы должны быть в гуще программирования, а не переживать о прохождении тестов.
        q_nothing: Я записался, но ничего не получил.
        a_nothing_html: Сначала проверьте папку со спамом. Если вы всё равно ничего не находите, напишите на %{email}, и мы всё для вас проверим!
