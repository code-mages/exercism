      story:
        hi_there: Hi there!
        im_jeremy_prefix: I'm Jeremy, and I've helped over
        two_million_people: two million people
        level_up: level up their coding skills.
        worrying_trend: But over the last few years, I've seen a really worrying trend...
        learning_prefix: More and more people are trying to learn to code (🥳) but they seem to be
        struggling_strong: struggling more than ever (😢).
        struggling_mid: And they're struggling with things that should be pretty straightforward once you've been learning for a while.
        not_grasping_fundamentals: People just don't seem to be grasping the fundamentals.
        crazy_statistic: So I started reading around to see if I could work out what was going on, and found a crazy statistic.
        give_up_stat: 96% of people who try to learn to code give up
        how_could_it_be: How could it be that so many people were trying to learn to code, but so few were actually succeeding?
        investigating: I went investigating… 🕵️
        watched_prefix: I watched the
        youtube_videos: most popular YouTube videos (🥱),
        tried_best: tried the "best"
        online_courses: online courses (😐),
        paid_friends: and even paid my friends to try to learn so I could see what happened (a mix of 😭😠🤬🙅‍♀️).
        dug_into_research: I dug into formal research, spoke to my friends in education, and pretty quickly came to a simple conclusion...
        teaching_causes_fail: The way people are being taught to code is causing them to fail!
        started_at_8: I started coding when I was 8. Back then, YouTube didn't exist. There weren't any "learn to code" websites. I didn't even have the internet. There was basically only one way to learn.
        make_stuff: Make stuff. Lots of stuff!
        caption_me_short: "1998: Me making the first website I ever got paid for."
        caption_me_rhodri: "1998: Me and Rhodri making the first website we ever got paid for."
        made_stuff_prefix: And make stuff I did! I started making games and then graduated to making little bots to play against. And as I grew older I made websites for me and my friends, and
        eventually_customers: eventually for customers.
        created_played: I created, I played, I experimented. I had fun!
        got_good_prefix: And through this, I got really good.
        coder_mindset: I learned the coder mindset,
        laid_foundations: and I laid the foundations that I've built my whole career on.
        not_how_modern: But that's not how these modern courses teach.
        practice_is_hard: It's much easier to just give you a video to watch, a quiz to take, and a certificate to print out.
        wont_learn_prefix: But you won't learn that way. You'll be
        bored_frustrated: bored, frustrated,
        and_like_most: and like most other people, you'll
        probably_quit: probably quit 😞😡
