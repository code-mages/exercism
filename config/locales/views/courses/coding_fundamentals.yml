        level5_strong: compound data type,
        level5_suffix: and Wordle!
        level6_num: Level 6
        level6_mid: focusses on
        level6_strong: coding mindset
        level6_suffix: and introduces your first major project!
        level7_prefix: In
        level7_num: Level 7
        level7_mid: you unlock
        level7_strong: dictionaries
        level7_suffix: making Emoji Collector possible.
        level8_prefix: In
        level8_num: Level 8
        level8_mid: you take a big step, learning
        level8_strong: Object Oriented Programming.
        level9_num: Level 9
        level9_mid: introduces
        level9_strong: methods
        level9_suffix: and you start to feel like a real coder.
        level10_prefix: And finally, in
        level10_num: Level 10
        level10_mid: you start to make your own
        level10_strong: classes.
      certificate:
        bubble: Celebrate your new skills!
        heading: Get a verified certificate
        text1: At the end of the Bootcamp, we'll issue you an official certificate to recognise your participation and completion of the course.
        text2: Show off your skills on your resume and in the Certifications section of your LinkedIn profile.
        linkedin: Share your certificate in your network
