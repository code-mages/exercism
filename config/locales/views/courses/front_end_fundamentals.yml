      exercism:
        heading: What makes Exercism special?
        intro_prefix: Exercism is a
        intro_nonprofit: longstanding nonprofit
        intro_helped: that's helped over
        intro_people: 2 million people
        intro_suffix: level-up their coding skills.
        students_title: Exercism students
        students_text: We've grown entirely by word of mouth. Good friends tell their friends about Exercism!
        testimonials_title: Testimonials
        testimonials_text: We've been one of the most trusted resources for coding education for over a decade.
        exercises_title: Exercises Solved
        exercises_text: Our exercises are trusted by the coding community as the perfect way to level up!
        mentoring_title: Mentoring Sessions
        mentoring_text: Our unique mentoring program is one of the best ways to get tips from experts!
      faqs:
        heading: Frequently Asked Questions
        intro: These are the questions we get asked the most. Your question not answered here?
        intro_email_link: Ping us an email!
        start_q: When does the Bootcamp start?
        start_a: The first session of Front-End Fundamentals be on April 26th 2025. If you buy the bundle with Coding Fundamentals, you can access all that content immediately!
        time_q: How much time will I need to spend each week on the bootcamp?
        time_a: We're aiming for about 8 hours per week (See the "What your week will look like" for more details). If you can put in an hour per day, that will be enough for you to get through the main work. If you can invest an extra few hours per week, you'll be able to also complete any more advanced exercises.
        missed_q: I missed the first part of the Bootcamp? Can I do join now?
        missed_a: The first part of the Bootcamp is now called "Coding Fundamentals" and is available for you to buy as part of the bundle above.
        group_q: Are there group activities and do I have to take part?
        group_a: There are no formal group activities. However, we encourage everyone to share their journey and explore programming together in our Discord server. Exploring other people's code is one of the best ways to improve your programming skills. Some students get together (virtually) for study sessions. You can choose to opt-out of the community aspects if you prefer.
        languages_q: What specific programming languages/techniques will be taught in Front-End Fundamentals?
        languages_a: We'll be teaching JavaScript, CSS and HTML. We'll be teaching modern JavaScript. We'll teach both a functional approach and also Object Oriented Programming, so you'll get a mixture of the things you see in the wild!
        limit_q: Is there a limit to the number of students who can join the live sessions?
        limit_a: No, the sessions will be streamed online and everyone will be able to ask questions and participate. You can watch them back at any time in the future.
        graded_q: Are the exercises graded or just for practice? Is there any form of assessment?
        graded_a: Most exercises can be completed by reaching a certain objective. However, they are not graded and your code isn't assessed or marked. We will explore some (anonymised) code in the weekly sessions and discuss how it could be improved, but our philosophy is that you should be in the trenches coding, not worrying about passing tests.
        discount_q: How does the discount for %{country_name} work?
        discount_a: We understand that $%{full_price} is a significant amount of money in countries with currencies that are weak against the dollar. So we're offering a %{discount_percentage}% discount to people in %{country_name} to ensure they can take part.
        discount_a2: Simply click the "Enroll now" button and the discount will be automatically applied at checkout.
        no_discount_q: Do you offer any discounts for students, unemployed or people in countries with weak currencies?
        no_discount_a_html: Yes, we do. We want to ensure as many people can benefit from this bootcamp as possible. Email %{email}, tell me your situation, and I'll see what we can do for you.
        signed_up_q: I've signed up but not received anything.
        signed_up_a_html: Please check your email. The first live session is on April 26th 2025, so you won't have access to anything until then. However, you should receive emails giving you more information. If you don't receive those, please email %{email} and we'll check everything for you.
      legals:
        is_registered: is a registered
        nonprofit: not-for-profit organisation.
