        heading: Get a verified certificate
        para1: At the end of the Bootcamp, we'll issue you an official certificate to recognise your participation and completion of the course.
        para2: Show off your skills on your resume and in the Certifications section of your LinkedIn profile.
        linkedin: Share your certificate in your network
