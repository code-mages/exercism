        two_million_people: two million people
        level_up: level up their coding skills.
        photo_caption_short: "1998: Me making the first website I ever got paid for."
        photo_caption_long: "1998: Me and Rhodri making the first website we ever got paid for."
        para_first_lines: When I first wrote my first lines of JavaScript over 25 years ago, almost no-one knew how to code. If you could make even the simplest of websites, you were a wizard! 🧙
        para_competitive_prefix: But now-a-days, web development is a very
        para_competitive_strong: competitive market.
        para_competitive_suffix: Standing out from the crowd is much tougher.
        para_standout_prefix: Lots of people think you stand out by knowing the
        para_standout_strong: most languages or the most frameworks.
        para_standout_suffix: But that's not true! When I'm hiring, I look for one thing...
        mindset_heading: Do you have the coding mindset?  🧠
        para_thrive_prefix: The people that thrive at coding, the ones that get the best jobs and enjoy the work the most share one thing. They have the
        para_thrive_coder_mindset: coder mindset.
        para_thrive_great_at: They are great at
        para_thrive_critical_thinking: critical thinking,
        para_thrive_great_at2: great at
        para_thrive_problem_solving: problem solving.
        para_think_prefix: To become a good developer you need to learn how to think like a coder. And the secret to that is to
        para_think_practice: practice making real things,
        para_think_with_right: with the right
        para_think_guidance: guidance, support and mentoring.
        what_course_heading: What is this course?
        para_new_type_prefix: This is a new type of course, that teaches you the fundamentals of web development - things like CSS and JavaScript - but does it differently, focussed on getting you
        para_new_type_building: building fun things.
        para_new_type_games_prefix: In the first few weeks, you'll be building games like
        para_new_type_games_strong: Space Invaders, Tic Tac Toe, and
        para_new_type_breakout: Breakout.
        para_new_type_bots_prefix: You'll be building bots that can solve mazes, and talking to real APIs like
        para_new_type_chatgpt: ChatGPT
        para_new_type_suffix: to build useful real-world projects.
        make_all_these: ☝️☝️☝️ You'll make all these in JavaScript, HTML and CSS from scratch!
        bootcamp_style_heading: Bootcamp Style!
        para_once_prefix: And once (just once!) we're going to run the course as an
        para_once_interactive: interactive bootcamp,
        para_once_where: where
        para_once_guide: I'll be there to guide you.
        para_once_suffix: I'll be there to explore ideas with you, help you if you get stuck, and have fun with you! ✨
        para_three_months_prefix: For 3 months, I'll teach you the fundamentals of web development, and help you
        para_three_months_strong: to think like a coder.
        para_mentors: And even more, we have world-class mentors to help you out. Some who have worked in web-dev for decades and others who have worked at places like Google. They'll be there to help nudge you in the right directions and challenge you even more!
        para_exciting_prefix: If that sounds exciting, then
        para_exciting_strong: I'd love for you to join us! 💙
      syllabus:
        tag: What you'll Learn
        menu_prefix: What's on the
        menu_strong: Menu?
        intro_prefix: We've put together a course that teaches all the things you need to be able to make
        intro_strong: beautiful, interactive websites.
        part_heading: Front-End Web Development 🧑‍💻
        part_intro_prefix: From April to July, you'll gain the skills you need to build
        part_intro_strong: beautiful, interactive websites
        part_intro_suffix: and kickstart your career.
        js_strong: Get comfortable with JavaScript.
        js_text: We'll be looking at the core JavaScript programming techniques essential for web development and building your confidence with the language.
        html_strong: Learn HTML and CSS.
        html_text: These two languages are the other fundamentals of web development. You'll learn both and use them to create beautiful websites.
        vscode_strong: Learn Visual Studio Code and Git.
        vscode_text: Master these important tools, and how to use them to make your life easier.
        portfolio_strong: Build a portfolio of projects.
        portfolio_text: Create projects to showcase to potential employers while practicing your skills.
        dates: April - July 2025
      schedule:
        heading: What your week will look like 🔎
        hours_teaching: 2 hours teaching
        hours_project: 6 hours project work
        intro: Each week we'll have a mix of live sessions and fun projects for you to work on!
        teaching_title: 1x 120min teaching sessions 🧑‍🏫
        teaching_text: In these core sessions, I'll slowly and carefully go through the next core concepts making sure everyone understands what I'm teaching. Join live to participate or watch back on demand.
        coding_title: 6+ hours of having fun coding 🧑‍💻
        coding_text: The most important part of the bootcamp! The more you code, the better your brain starts to piece everything together. If you get too busy in a week to do everything, this is the bit to focus on!
        labs_title: 1x 120min "Labs" session 💊
        labs_text: No-one's getting stuck in this bootcamp! Each week we'll dedicate time to working through people's problems together. If you can't attend, message me where you're stuck and then watch back later!
        discuss_title: 1 hour of discussing code 🗣️
        discuss_text: Discussing code is another great way to reinforce your skills. Invest some time into answering questions and helping other students get unstuck, and you'll quickly level up your own knowledge.
      portfolio:
        heading: A few things we'll build together ✨
        sideheading: Build your portfolio during the bootcamp!
        intro: Our focus from day one is to get you building fun things. You'll make classic games (and bots to beat them!), interesting websites, and integrate with APIs like ChatGPT to make cutting edge projects!
        snake_prefix: Recreate the classic
        snake_strong: Nokia Snake
        snake_suffix: game
        tetris_prefix: Create a
        tetris_strong: Tetris
