      faqs:
        heading: Часто задаваемые вопросы
        intro: Это вопросы, которые нам задают чаще всего. Не нашли ответа на свой вопрос?
        intro_email_link: Напишите нам письмо!
        start_q: Когда начинается буткемп?
        start_a: Первая сессия Front-End Fundamentals пройдёт 26 апреля 2025 года. Если вы купите комплект c Coding Fundamentals, то сможете получить доступ ко всему этому контенту сразу!
        time_q: Сколько времени в неделю мне понадобится на буткемп?
        time_a: Мы ориентируемся примерно на 8 часов в неделю (подробнее смотрите в разделе "Как будет выглядеть ваша неделя"). Если вы сможете уделять по часу в день, этого будет достаточно, чтобы пройти основную работу. Если вы сможете вкладывать ещё несколько часов в неделю, то сможете выполнять и более продвинутые упражнения.
        missed_q: Я пропустил первую часть буткемпа? Могу ли я присоединиться сейчас?
        missed_a: Первая часть буткемпа теперь называется "Coding Fundamentals" и доступна для покупки в составе комплекта выше.
        group_q: Есть ли групповые активности и обязан ли я в них участвовать?
        group_a: Формальных групповых активностей нет. Однако мы поощряем всех делиться своим путём и вместе исследовать программирование в нашем Discord-сервере. Изучение чужого кода один из лучших способов улучшить навыки программирования. Некоторые студенты собираются (виртуально) на совместные учебные сессии. Если хотите, вы можете отказаться от общественной части.
        languages_q: Каким именно языкам программирования и техникам обучают в Front-End Fundamentals?
        languages_a: Мы будем обучать JavaScript, CSS и HTML. Мы будем обучать современному JavaScript. Мы разберём как функциональный подход, так и объектно-ориентированное программирование, так что вы получите смесь того, что встречается в реальной жизни!
        limit_q: Есть ли ограничение на число студентов, которые могут присоединиться к живым сессиям?
        limit_a: Нет, сессии будут транслироваться онлайн, и каждый сможет задавать вопросы и участвовать. Вы сможете пересмотреть их в любое время в будущем.
        graded_q: Упражнения оцениваются или они только для практики? Есть ли какая-то форма аттестации?
        graded_a: Большинство упражнений можно выполнить, достигнув определённой цели. Однако они не оцениваются, и ваш код не проверяется и не аттестуется. Мы разберём часть (обезличенного) кода на еженедельных сессиях и обсудим, как его можно улучшить, но наша философия в том, что вы должны быть в гуще программирования, а не переживать о прохождении тестов.
        discount_q: Как работает скидка для страны %{country_name}?
        discount_a: Мы понимаем, что $%{full_price} это значительная сумма в странах c валютами, слабыми относительно доллара. Поэтому мы предлагаем скидку %{discount_percentage}% людям в стране %{country_name}, чтобы они могли принять участие.
        discount_a2: Просто нажмите кнопку "Записаться", и скидка автоматически применится при оформлении.
        no_discount_q: Предлагаете ли вы скидки студентам, безработным или людям из стран со слабыми валютами?
        no_discount_a_html: Да, предлагаем. Мы хотим, чтобы как можно больше людей могли воспользоваться этим буткемпом. Напишите на %{email}, расскажите о своей ситуации, и я посмотрю, что мы можем для вас сделать.
        signed_up_q: Я записался, но ничего не получил.
        signed_up_a_html: Пожалуйста, проверьте свою почту. Первая живая сессия пройдёт 26 апреля 2025 года, так что доступа ни к чему до этого не будет. Однако вы должны получать письма c дополнительной информацией. Если вы их не получаете, напишите на %{email}, и мы всё для вас проверим.
