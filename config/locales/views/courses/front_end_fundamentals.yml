        breakout_prefix: "Recreate my childhood favourite:"
        breakout_strong: Breakout
        ttt_prefix: Create your first bot to beat
        ttt_strong: Tic Tac Toe
        weather_prefix: Design a responsive
        weather_strong: Weather App
        story_prefix: Create a story along with
