en:
  pages:
    index:
      header:
        title_html: Get <strong>really</strong> good at programming.
        subtitle_html:
          Develop fluency in <em>%{num_tracks} programming languages</em>
          with our unique blend of learning, practice and mentoring. Exercism is
          fun, effective and <strong>100% free, forever.</strong>
        signup_button: Sign up for free
        explore_button: Explore languages
        organisation_description: is an independent, community funded, not-for-profit organisation.
        learn_more_link: Learn more
      tracks_section:
        title_html:
          Explore and <strong>get fluent</strong> in <br> %{num_tracks}
          programming languages
        students_count:
          one: 1 student
          other: "%{count} students"
        all_tracks_link: See all %{num_tracks} Language Tracks
      exercises_section:
        title_html: Over <strong>%{count} coding exercises.</strong> <br> From
          "Allergies" to "Zebra Puzzle".
        subtitle:
          Learn by doing. Get better at programming through fun coding exercises
          that build your understanding of concepts.
        more_tracks: +%{count} more
        features:
          local_title: Write code locally, in your own space
          local_description:
            Exercism is primarily built as a CLI-first tool. Download and
            submit exercises right from your terminal.
          editor_title: Use the Exercism in-browser editor
          editor_description:
            Don't spend hours installing a language locally just to
            try it out. We support all %{num_tracks} of our programming
            languages in our in-browser editor.
          analysis_title: Get automated analysis on your code
          analysis_description:
            Not quite sure how well you've done? We run automatic
            analysis on your solutions to give you quick feedback and points of
            improvement.
      mentoring_section:
        title_html: Deepen your knowledge with human mentoring, <strong>for free.</strong>
        subtitle:
          Discover new and exciting ways to approach an exercise by getting
          mentored on it. Become more familiar with the conventions, idioms and
          opinions of a particular programming language.
        why_mentoring_title: Why mentoring?
        features:
          knowledge_gaps_title: You don't know what you don't know
          knowledge_gaps_description:
            When learning a new language, the hardest part is
            not being aware of the gaps in your knowledge. Our mentors can look
            at your code and immediately see the ideas you're not familiar
            with and give you a level-up by unlocking new knowledge.
          conventions_title: Learn language-specific conventions
          conventions_description:
            Becoming fluent in a language is more than being able
            to write code in it - it's about being able to think in that
            language. Our mentors will help guide you to how to reshape your
            thinking to write idiomatic code.
          learning_fun_title: Learning with others is fun
          learning_fun_description:
            Getting feedback from real people is an amazingly
            exciting way to learn. And becoming a mentor and giving feedback
            yourself is an even bigger step forward. So complete the circle - be
            mentored and mentor 🎉
ru:
  pages:
    index:
      header:
        title_html: Станьте <strong>по-настоящему</strong> хороши в программировании.
        subtitle_html:
          Развивайте свободное владение <em>%{num_tracks} языками программирования</em>
          с нашим уникальным сочетанием обучения, практики и менторства. Exercism
          интересный, эффективный и <strong>на 100% бесплатный, навсегда.</strong>
        signup_button: Зарегистрироваться бесплатно
        explore_button: Изучить языки
        organisation_description: это независимая некоммерческая организация, финансируемая сообществом.
        learn_more_link: Узнать больше
      tracks_section:
        title_html:
          Изучайте и <strong>осваивайте в совершенстве</strong> <br> %{num_tracks}
          языков программирования
        students_count:
          one: 1 студент
          few: "%{count} студента"
          many: "%{count} студентов"
          other: "%{count} студентов"
        all_tracks_link: Посмотреть все %{num_tracks} языковых треков
      exercises_section:
        title_html: Более <strong>%{count} упражнений по программированию.</strong> <br> От
          "Аллергий" до "Головоломки с зебрами".
        subtitle:
          Учитесь на практике. Становитесь лучше в программировании с помощью увлекательных
          упражнений, которые укрепляют ваше понимание концепций.
        more_tracks: +%{count} ещё
        features:
          local_title: Пишите код локально, в своём пространстве
          local_description:
            Exercism в первую очередь создан как инструмент с приоритетом CLI. Скачивайте
            и отправляйте упражнения прямо из терминала.
          editor_title: Используйте встроенный редактор Exercism в браузере
          editor_description:
            Не тратьте часы на локальную установку языка только ради того,
            чтобы его попробовать. Мы поддерживаем все %{num_tracks} наших языков
            программирования в нашем редакторе в браузере.
          analysis_title: Получайте автоматический анализ вашего кода
          analysis_description:
            Не совсем уверены, насколько хорошо у вас получилось? Мы запускаем
            автоматический анализ ваших решений, чтобы дать вам быструю обратную связь
            и точки для улучшения.
      mentoring_section:
        title_html: Углубите свои знания с менторством от людей, <strong>бесплатно.</strong>
        subtitle:
          Откройте новые и увлекательные способы подхода к упражнению, получив
          по нему менторство. Познакомьтесь ближе с соглашениями, идиомами и
          подходами конкретного языка программирования.
        why_mentoring_title: Зачем менторство?
        features:
          knowledge_gaps_title: Вы не знаете того, чего не знаете
          knowledge_gaps_description:
            При изучении нового языка самое сложное это
            не осознавать пробелы в своих знаниях. Наши менторы могут посмотреть
            на ваш код и сразу увидеть идеи, с которыми вы не знакомы,
            и поднять ваш уровень, открыв новые знания.
          conventions_title: Изучайте соглашения, специфичные для языка
          conventions_description:
            Свободно владеть языком это больше, чем уметь
            писать на нём код, это про умение думать на этом
            языке. Наши менторы помогут вам перестроить своё
            мышление, чтобы писать идиоматичный код.
          learning_fun_title: Учиться вместе с другими весело
          learning_fun_description:
            Получать обратную связь от реальных людей это удивительно
            увлекательный способ учиться. А стать ментором и самому давать обратную связь
            это ещё больший шаг вперёд. Так что замкните круг, получайте
            менторство и менторьте сами 🎉
