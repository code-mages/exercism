en:
  donations_mailer:
    payment_created:
      body_markdown: |-
        Hi %{user_handle},

        Thank you for your donation! Exercism exists to bring the joy of programming to everyone, everywhere.  
        Your donation helps make everything we do possible.

        You can see all the donations you've made to Exercism, and download your receipts, in your Settings page.  
        If you have any questions about your donation, please reply to this email.

        Thank you again!

        [View your donations](%{donations_url})
ru:
  donations_mailer:
    payment_created:
      body_markdown: |-
        Привет, %{user_handle}!

        Спасибо за ваше пожертвование! Exercism существует, чтобы дарить радость программирования каждому и повсюду.
        Ваше пожертвование помогает делать всё, что мы делаем, возможным.

        Вы можете посмотреть все пожертвования, которые вы сделали для Exercism, и скачать свои чеки на странице настроек.
        Если у вас есть вопросы о вашем пожертвовании, просто ответьте на это письмо.

        Ещё раз спасибо!

        [Посмотреть ваши пожертвования](%{donations_url})
