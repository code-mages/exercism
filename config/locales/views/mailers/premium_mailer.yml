en:
  premium_mailer:
    payment_created:
      body_markdown: >
        Hi %{user_handle},


        Thank you for your Donation to Exercism! As well as giving you some
        fun benefits, your payment also keeps the core Exercism product free
        for everyone. So thank you.


        You can see all the payments you've made to Exercism, and download
        your receipts, in your Settings page. If you have any questions about
        your payment, please reply to this email.


        We hope you enjoy Exercism Insiders!
ru:
  premium_mailer:
    payment_created:
      body_markdown: >
        Привет, %{user_handle}!


        Спасибо за ваше пожертвование в пользу Exercism! Помимо приятных
        бонусов для вас, ваш платёж помогает сохранять основной продукт
        Exercism бесплатным для всех. Так что спасибо.


        Вы можете просмотреть все платежи, которые вы совершили в пользу
        Exercism, и скачать свои чеки на странице настроек. Если у вас есть
        вопросы по вашему платежу, просто ответьте на это письмо.


        Надеемся, вам понравится Exercism Insiders!
