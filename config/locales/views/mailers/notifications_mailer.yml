        Мы зарегистрированная некоммерческая организация и на 100% бесплатны.

        Я собрал это видео (возможно, вы уже видели его при регистрации), которое проведёт вас по нескольким ключевым моментам 👇

        <a href="%{youtube_video_url}" style="display:block; box-shadow: 0px 2px 4px #0F0923">
          <img src="%{youtube_thumbnail_url}" style="width:100%; display:block" />
        </a>

        Если вы когда-нибудь застрянете или у вас появятся вопросы, не стесняйтесь написать на [нашем форуме](https://forum.exercism.org).
        Наше сообщество дружелюбное и отзывчивое, и мы всегда рады помочь.
        Мы верим, что обучение – это совместное усилие и что мы все можем учиться друг у друга.

        Наконец, не пропустите наш [YouTube-канал](https://www.youtube.com/@Exercism_org), где мы делимся интересными интервью, разборами и туториалами про Exercism.
        Возможно, вы найдёте какие-то советы и приёмы, которые сделают ваш путь обучения ещё приятнее.

        Хорошего дня!

        Jeremy Walker
        Сооснователь и CEO Exercism

