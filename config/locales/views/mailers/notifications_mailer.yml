en:
  notifications_mailer:
    eligible_for_lifetime_insiders:
      body_markdown: |-
        Hey!

        I'm excited to let you know you're eligible for Exercism Insiders – our rewards program for people who contribute, mentor, or donate to Exercism.  
        You can activate your Insiders account on the [Insiders Page](%{insiders_url}).

        Insiders gives you a few extra benefits:

        - Access to our sexy Dark Mode
        - ChatGPT Integration for when you get stuck on exercises
        - Behind the scenes content. You can watch videos from me and the team, keeping you in the loop, as we work on Exercism.
        - Closer access to the team and key community members, with our dedicated #insiders Discord channel.
        - Extra mentoring slots.
        - Exclusive Badges
        - And more!

        We've granted you **Lifetime** status, which means you'll always have access to Insiders.  
        The [Insiders Page](%{insiders_url}) contains lots more detail, or watch the video below to learn more 👇

        <a href="https://www.youtube.com/watch?v=iwhahd41h0A" style="display:block; box-shadow: 0px 2px 4px #0F0923">
          <img src="https://assets.exercism.org/images/thumbnails/introducing-insiders-with-play-icon.jpg" style="width:100%; display:block" />
        </a>

        Thanks so much for being part of Exercism's story. I really hope you enjoy Insiders!

        Jeremy Walker  
        Exercism's Co-founder & CEO

        [Activate Insiders](%{insiders_url})
    student_timed_out_discussion_student:
      body_markdown: >
        Hi %{user_handle},


        The discussion with %{discussion_mentor_handle} on your solution to
        %{exercise_title} on the %{track_title} track has timed out.


        [Go to the discussion](%{discussion_url})
    nudge_mentor_to_reply_in_discussion:
      body_markdown: |-
        Hi %{user_handle},

        This is a friendly reminder that your student (%{student_handle}) has been waiting %{num_days_waiting} days for you to reply in [the discussion](%{discussion_url}) on their solution to %{exercise_title} on the %{track_title} track.

        If it's not your turn and you're waiting on the student, please use the "It's the student's turn…" button in the mentoring UI.

        The discussion will time out in %{num_days_to_time_out} days if you do not reply.

        [Go to the discussion](%{discussion_url})
    expired_insiders:
      body_markdown: >
        Hey there,


        Your access to [Exercism Insiders](%{insiders_url}) has now expired.


        Thank you for supporting Exercism. We've helped over 1M people improve
        their programing skills for free, and we rely on people like you to
        support us. So thank you so much for doing so.


        If you'd like to continue supporting us, that would mean the world to
        us.

        You can set up a new regular donation on the [Insiders
        page](%{insiders_url})


        Have a great day!


        Jeremy Walker

        Exercism's Co-founder & CEO


        [Visit Exercism](%{root_url})
    mentor_timed_out_discussion_student:
      body_markdown: |-
        Hi %{user_handle},

        The discussion with %{mentor_handle} on your solution to %{exercise_title} on the %{track_title} track has timed out.

        [Go to the discussion](%{discussion_url})
    onboarding_insiders:
      body_markdown: |-
        Hey there,

        I hope you're enjoying [Exercism](https://exercism.org) so far!  
        Did you know that **we're a not-for-profit organisation?**  
        We want everyone to be able to benefit from Exercism, no matter how much money they have, so we keep the site 100% free.

        To do that, we rely on donations to keep Exercism running.  
        We're an extremely lean operation and considering we serve over 1.5 million people, we have very low costs (~$250k/year).  
        I put a video together that explains more 👇

        <a href="%{video_url}" style="display:block; box-shadow: 0px 2px 4px #0F0923; margin-bottom:16px">
          <img src="%{video_thumbnail_url}" style="width:100%; display:block" />
        </a>

        If you do find Exercism useful and if you can afford to do so, please support us by making a donation.  
        However, if you can't afford it, please know that this is not a requirement and our platform will always be available to you for free.

        Your support, whether through a donation or simply spreading the word about Exercism, is critical in helping us achieve our social mission.  
        Every bit counts and helps us bring quality programming education to more people around the world.

        Thank you for being a part of our community and for supporting our social mission.  
        We look forward to seeing all the amazing things you will achieve with Exercism.

        Best regards,  

        Jeremy Walker  
        Exercism Co-founder & CEO

        [Visit Exercism](%{root_url})
    acquired_badge:
      body_markdown: |
        Hi %{user_handle},

        Congratulations! You've unlocked a new badge at Exercism.
        Visit your Exercism Journey page to see what you earned.

        [Show me what I unlocked!](%{journey_url})
    onboarding_community:
      body_markdown: |-
        Hello there!

        I hope you're enjoying your first few days on [Exercism](https://exercism.org).  
        As you continue to explore our platform, I wanted to take a moment to tell you about our amazing community.

        Exercism is an open-source, community-powered project.  
        In fact, we're one of the biggest open-source organisations on [GitHub](https://github.com/exercism/) with over 350 repositories.  
        Our community is centered around our values of empathy, kindness, and inclusivity.  
        Check out this video or read more below 👇

        <a href="%{youtube_video_url}" style="display:block; box-shadow: 0px 2px 4px #0F0923">
          <img src="%{youtube_thumbnail_url}" style="width:100%; display:block" />
        </a>

        We have several community areas that you might find interesting and enjoyable:

        - Our [Discord](https://exercism.org/r/discord) channel is the place to go to hang out with the Exercism community, join community calls, and get quick support.
        - Our [forum](https://exercism.org/r/forum) is a great place to ask longer-form questions, share ideas, and connect with others who are passionate about coding.
        - Our [YouTube Channel](https://exercism.org/r/youtube) is the space to find our best video content — educational walkthroughs, Exercism updates, community stories, and interviews with industry experts.
        - On [Twitch](https://exercism.org/r/twitch), we host live streams featuring both our community and guests from the coding ecosystem.

        We would love for you to join in and become an active member of our community.  
        Whether you're a seasoned developer or just starting out, there is a place for you here.  
        So don't be shy, come say hello and get involved!

        Best regards,  

        Jeremy Walker  
        Exercism Co-founder & CEO

        [Visit Exercism](%{root_url})
    onboarding_product:
      body_markdown: |-
        Hey there,

        It's been a day or so since you signed up to [Exercism](https://exercism.org), and I wanted to check how you're getting on so far?

        Sometimes Exercism can be a bit overwhelming at first. Some people get a bit lost and things don't quite make sense to them.  
        If you get stuck, check out our [Discord](https://exercism.org/r/discord) or [Forum](https://exercism.org/r/forum), where you can ask for help.  
        It's always helpful for us to know where people are tripping up so we can fix it, so please don't be afraid to speak up!

        If you've not started exploring a language yet, we have over 65 to choose from, including the most widely used languages (e.g. Python, JavaScript, C#), the popular new-kids on the block (e.g. Go, Elixir, Rust) and some quite unusual and esoteric languages (e.g. 8th, COBOL, Prolog).  
        There's tons to learn and a lot of fun to be had!

        And as a final reminder, Exercism is 100% free, open-source and not for profit. Enjoy!

        Best regards,  

        Jeremy Walker  
        Exercism Co-founder & CEO

        [Visit Exercism](%{root_url})
    mentor_timed_out_discussion_mentor:
      body_markdown: |-
        Hi %{user_handle},

        The discussion with your student (%{student_handle}) on their solution to %{exercise_title} on the %{track_title} track has timed out.

        [Go to the discussion](%{discussion_url})
    mentor_started_discussion:
      body_markdown: |-
        Hi %{user_handle},

        A mentor (%{mentor_handle}) has started mentoring your solution to %{exercise_title} on the %{track_title} track.

        [Go to the discussion](%{discussion_url})
    student_finished_discussion:
      body_markdown: |-
        Hi %{user_handle},

        Your student (%{student_handle}) has finished the discussion you are mentoring for %{exercise_title} on the %{track_title} track.

        [Go to the discussion](%{discussion_url})
    automated_feedback_added:
      body_markdown: >
        Hi %{user_handle},


        New feedback has been added to iteration (#%{iteration_idx}) of your
        solution to %{exercise_title} on the %{track_title} track. We
        %{emphasis}recommend taking a look and seeing how you can improve your
        solution!


        Go to the iteration: %{iteration_url}
    upgraded_to_lifetime_insiders:
      body_markdown: |-
        Hey!

        I'm excited to let you know that you've been upgraded to Lifetime membership of [Exercism Insiders](https://exercism.org/insiders)!

        As a Lifetime Insider, you're one of the few people who have had a huge impact on the platform and shaped it into what it is today.  
        You've helped thousands of people and made a huge difference — thank you.  
        Insiders is a tiny way of us saying thank you for all you've done.

        Congratulations on reaching the Lifetime threshold and thanks again for being part of Exercism 🙂

        Jeremy Walker  
        Exercism's Co-founder & CEO

        [Visit Exercism](%{root_url})
    nudge_student_to_reply_in_discussion:
      body_markdown: |-
        Hi %{user_handle},

        This is a friendly reminder that your mentor (%{mentor_handle}) has been waiting %{num_days_waiting} days for you to reply in [the discussion](%{discussion_url}) on your solution to %{exercise_title} on the %{track_title} track.

        If you are actually waiting for the mentor, please add a comment to the discussion to let them know.

        The discussion will time out in %{num_days_to_time_out} days if you do not reply.

        [Go to the discussion](%{discussion_url})
    added_to_contributors_page:
      body_markdown: >
        Hi %{user_handle},


        You have now been added to Exercism's official list of contributors
        and show up on our contributors page.


        Thank you so much for being a part of Exercism and helping us provide
        free, world-class programming education to as many people as possible.


        [Explore the contributors page](%{contributors_url})
    mentor_replied_to_discussion:
      body_markdown: >
        Hi %{user_handle},


        Your mentor (%{mentor_handle}) has commented on your discussion about
        %{exercise_title} on the %{track_title} track.


        [Go to the discussion](%{discussion_url})
    student_timed_out_discussion_mentor:
      body_markdown: >
        Hi %{user_handle},


        The discussion with your student (%{student_handle}) on their solution
        to %{exercise_title} on the %{track_title} track has timed out.


        [Go to the discussion](%{discussion_url})
    joined_insiders:
      body_markdown: |-
        Hey!

        Welcome to [Exercism Insiders](https://exercism.org/insiders)!  
        Thank you for being part of our story and helping make Exercism the huge success that it is.  
        Insiders is a small way of us saying thank you for your support.

        To learn about what's in Insiders, please check out the [Insiders Page](https://exercism.org/insiders),  
        or watch our introductory video below 👇

        <a href="%{youtube_video_url}" style="display:block; box-shadow: 0px 2px 4px #0F0923">
          <img src="%{youtube_thumbnail_url}" style="width:100%; display:block" />
        </a>

        I'd love to hear all your thoughts and ideas on our dedicated [#insiders channel on Discord](https://discord.com/channels/854117591135027261/1103737555490447460).  
        So come along and say hello!

        Thanks for being part of our journey. I'm excited for what comes next 🙂

        Jeremy Walker  
        Exercism's Co-founder & CEO

        [Visit Exercism](%{root_url})
    joined_exercism:
      body_markdown: |-
        Hey there,

        Welcome to [Exercism](https://exercism.org)!  
        We're excited to have you as a part of our community and looking forward to helping you as you go even deeper on your programming journey.

        Exercism is designed to help you develop a deep understanding of whichever language you choose to learn.  
        We're a registered not-for-profit organisation and 100% free.

        I put this video together (which you might have seen when you signed up) that walks you through a few key things 👇

        <a href="%{youtube_video_url}" style="display:block; box-shadow: 0px 2px 4px #0F0923">
          <img src="%{youtube_thumbnail_url}" style="width:100%; display:block" />
        </a>

        If you ever get stuck or have questions, don't hesitate to post in [our forum](https://forum.exercism.org).  
        Our community is friendly and supportive, and we're always happy to help.  
        We believe that learning is a collaborative effort and that we can all learn from each other.

        Finally, don't miss out on our [YouTube channel](https://www.youtube.com/@Exercism_org) where we share interesting interviews, walkthroughs, and tutorials about Exercism.  
        You might find some tips and tricks that will make your learning journey even more enjoyable.

        Have a great day!

        Jeremy Walker  
        Exercism's Co-founder & CEO

        [Visit Exercism](%{root_url})
    eligible_for_insiders:
      body_markdown: >
        Hey!


        I'm excited to let you know you're eligible for Exercism Insiders -
        our rewards program for people who contribute, mentor, or donate to
        Exercism.

        You can activate your Insiders account on the [Insiders
        Page](%{insiders_url}).


        Insiders gives you three main benefits:

        1. Exercism Premium for free. You now have access to Dark Mode,
        ChatGPT Integration, extra mentoring slots and more.

        2. Behind the scenes content. You can watch videos from me and the
        team, keeping you in the loop, as we work on Exercism.

        3. Closer access to the team and key community members, with our
        dedicated #insiders Discord channel.


        The Insiders Page contains lots more detail!

        Your Insiders status will continue for as long as you're actively
        contributing, mentoring or donating.

        You can also earn a Lifetime Insiders status by hitting certain
        thresholds.


        Thanks so much for being part of Exercism's story. I really hope you
        enjoy Insiders!


        Jeremy Walker

        Exercism's Co-founder & CEO


        Activate Insiders: %{insiders_url}
    mentor_finished_discussion:
      body_markdown: |-
        Hi %{user_handle},

        Your mentor (%{mentor_handle}) has finished the discussion for your solution on %{exercise_title} on the %{track_title} track.

        [Go to the discussion](%{discussion_url})
    joined_lifetime_insiders:
      body_markdown: |
        Hey!

        Welcome to [Exercism Insiders](%{insiders_url})!  
        Thank you for being part of our story and helping make Exercism the huge success that it is.  
        As a **Lifetime Insider**, you're one of the few people who have had a huge impact on the platform and shaped it into what it is today.  
        You've helped thousands of people and made a huge difference – thank you.  
        Insiders is a tiny way of us saying thank you for all you've done.

        To learn about what's in Insiders, please check out the dedicated page, or watch our introductory video below 👇

        <p style="margin-bottom: 24px">
          <a href="%{youtube_video_url}" style="display:block; box-shadow: 0px 2px 4px #0F0923">
            <img src="%{youtube_thumbnail_url}" style="width:100%; display:block" />
          </a>
        </p>

        I'd love to hear all your thoughts and ideas on our dedicated [#insiders channel on Discord](%{discord_channel_url}).  
        So come along and say hello!

        Thanks again for being part of Exercism. I'm excited for what's next! 🙂

        Jeremy Walker  
        Exercism’s Co-founder & CEO

        [Visit Exercism](%{root_url})
    student_replied_to_discussion:
      body_markdown: |-
        Hi %{user_handle},

        Your student (%{student_handle}) has commented on your discussion about %{exercise_title} on the %{track_title} track.

        [Go to the discussion](%{discussion_url})
    nudge_to_request_mentoring:
      body_markdown: >
        Hi %{user_handle},


        You've completed a few exercises (nice work!) but not yet requested
        mentoring on any of your solutions.


        Receiving feedback from our mentors is an amazing way of discovering
        your knowledge gaps and levelling up your skills. It's one of
        Exercism's most valuable features, and like all of Exercism, it's
        absolutely free!


        Choose a solution that you feel has the most room for improvement and
        request a mentor to take a look at it. They should get back to you
        within a day or so with some ideas!


        [Choose a solution →](%{notification_url})
    student_added_iteration:
      body_markdown: |-
        Hi %{user_handle},

        Your student (%{student_handle}) has submitted a new iteration (%{iteration_number}) on your discussion about %{exercise_title} on the %{track_title} track.

        [Go to the discussion](%{discussion_url})
    acquired_trophy:
      body_markdown: >
        Hi %{user_handle},


        Congratulations! You've unlocked a new trophy on the %{track_title}
        track.

        Visit the %{track_title} track page and check the trophy cabinet to
        see what you earned.

        [Show me what I unlocked!](%{track_url})
ru:
  notifications_mailer:
    eligible_for_lifetime_insiders:
      body_markdown: |-
        Привет!

        Рад сообщить, что вы получили право на участие в Exercism Insiders – нашей программе поощрений для тех, кто вносит вклад, менторит или жертвует Exercism.
        Активировать аккаунт Insiders можно на [странице Insiders](%{insiders_url}).

        Insiders даёт несколько дополнительных преимуществ:

        - Доступ к нашей стильной тёмной теме
        - Интеграцию с ChatGPT для случаев, когда вы застряли на упражнениях
        - Закулисный контент. Вы сможете смотреть видео от меня и команды и быть в курсе того, как мы работаем над Exercism.
        - Более близкий доступ к команде и ключевым участникам сообщества в нашем отдельном канале #insiders в Discord.
        - Дополнительные слоты для менторинга.
        - Эксклюзивные значки
        - И многое другое!

        Мы предоставили вам статус **Lifetime**, а это значит, что доступ к Insiders у вас будет всегда.
        На [странице Insiders](%{insiders_url}) гораздо больше деталей, или посмотрите видео ниже, чтобы узнать больше 👇

        <a href="https://www.youtube.com/watch?v=iwhahd41h0A" style="display:block; box-shadow: 0px 2px 4px #0F0923">
          <img src="https://assets.exercism.org/images/thumbnails/introducing-insiders-with-play-icon.jpg" style="width:100%; display:block" />
        </a>

        Огромное спасибо за то, что стали частью истории Exercism. Очень надеюсь, что вам понравится Insiders!

        Jeremy Walker
        Сооснователь и CEO Exercism

        [Активировать Insiders](%{insiders_url})
    student_timed_out_discussion_student:
      body_markdown: >
        Привет, %{user_handle},


        Обсуждение с %{discussion_mentor_handle} вашего решения упражнения
        %{exercise_title} на треке %{track_title} было закрыто по тайм-ауту.


        [Перейти к обсуждению](%{discussion_url})
    nudge_mentor_to_reply_in_discussion:
      body_markdown: |-
        Привет, %{user_handle},

        Это дружеское напоминание о том, что ваш ученик (%{student_handle}) уже %{num_days_waiting} дней ждёт вашего ответа в [обсуждении](%{discussion_url}) его решения упражнения %{exercise_title} на треке %{track_title}.

        Если сейчас не ваша очередь и вы ждёте ученика, воспользуйтесь кнопкой «It's the student's turn…» в интерфейсе менторинга.

        Обсуждение будет закрыто по тайм-ауту через %{num_days_to_time_out} дней, если вы не ответите.

        [Перейти к обсуждению](%{discussion_url})
    expired_insiders:
      body_markdown: >
        Здравствуйте,


        Ваш доступ к [Exercism Insiders](%{insiders_url}) истёк.


        Спасибо за поддержку Exercism. Мы помогли более чем 1 млн человек
        бесплатно улучшить их навыки программирования, и мы полагаемся на таких
        людей, как вы, чтобы нас поддерживать. Так что огромное вам за это спасибо.


        Если вы захотите продолжить нас поддерживать, для нас это будет очень
        много значить.

        Настроить новое регулярное пожертвование можно на [странице
        Insiders](%{insiders_url})


        Хорошего дня!


        Jeremy Walker

        Сооснователь и CEO Exercism


        [Перейти в Exercism](%{root_url})
    mentor_timed_out_discussion_student:
      body_markdown: |-
        Привет, %{user_handle},

        Обсуждение с %{mentor_handle} вашего решения упражнения %{exercise_title} на треке %{track_title} было закрыто по тайм-ауту.

        [Перейти к обсуждению](%{discussion_url})
    onboarding_insiders:
      body_markdown: |-
        Здравствуйте,

        Надеюсь, вам пока нравится [Exercism](https://exercism.org)!
        Вы знали, что **мы некоммерческая организация?**
        Мы хотим, чтобы Exercism мог принести пользу каждому, независимо от того, сколько у него денег, поэтому оставляем сайт на 100% бесплатным.

        Чтобы это работало, мы полагаемся на пожертвования, которые позволяют Exercism существовать.
        Мы работаем крайне экономно, и, учитывая, что мы обслуживаем более 1,5 миллиона человек, у нас очень низкие расходы (~$250k в год).
        Я собрал видео, которое объясняет подробнее 👇

        <a href="%{video_url}" style="display:block; box-shadow: 0px 2px 4px #0F0923; margin-bottom:16px">
          <img src="%{video_thumbnail_url}" style="width:100%; display:block" />
        </a>

        Если Exercism вам полезен и если вы можете себе это позволить, пожалуйста, поддержите нас пожертвованием.
        Но если вы не можете себе этого позволить, знайте, что это не обязательно, и наша платформа всегда будет доступна вам бесплатно.

        Ваша поддержка, будь то пожертвование или просто рассказ об Exercism другим, крайне важна для достижения нашей социальной миссии.
        Каждая мелочь имеет значение и помогает нам приносить качественное образование в программировании большему числу людей по всему миру.

        Спасибо, что стали частью нашего сообщества и поддерживаете нашу социальную миссию.
        Мы с нетерпением ждём всех тех удивительных вещей, которых вы достигнете с Exercism.

        С наилучшими пожеланиями,

        Jeremy Walker
        Сооснователь и CEO Exercism

        [Перейти в Exercism](%{root_url})
    acquired_badge:
      body_markdown: |
        Привет, %{user_handle},

        Поздравляем! Вы открыли новый значок на Exercism.
        Загляните на страницу Journey в Exercism, чтобы увидеть, что вы заработали.

        [Показать, что я открыл!](%{journey_url})
    onboarding_community:
      body_markdown: |-
        Здравствуйте!

        Надеюсь, вам нравятся первые дни на [Exercism](https://exercism.org).
        Пока вы продолжаете изучать нашу платформу, я хотел уделить минуту и рассказать о нашем замечательном сообществе.

        Exercism – это проект с открытым исходным кодом, движимый сообществом.
        Более того, мы одна из крупнейших open-source организаций на [GitHub](https://github.com/exercism/), у нас более 350 репозиториев.
        Наше сообщество строится вокруг ценностей эмпатии, доброты и инклюзивности.
        Посмотрите это видео или почитайте подробнее ниже 👇

        <a href="%{youtube_video_url}" style="display:block; box-shadow: 0px 2px 4px #0F0923">
          <img src="%{youtube_thumbnail_url}" style="width:100%; display:block" />
        </a>

        У нас есть несколько сообществ, которые могут показаться вам интересными и приятными:

        - Наш канал в [Discord](https://exercism.org/r/discord) – это место, где можно пообщаться с сообществом Exercism, присоединиться к общим созвонам и быстро получить поддержку.
        - Наш [форум](https://exercism.org/r/forum) – отличное место, чтобы задавать более развёрнутые вопросы, делиться идеями и общаться с другими людьми, увлечёнными программированием.
        - Наш [YouTube-канал](https://exercism.org/r/youtube) – это место, где можно найти наш лучший видеоконтент: обучающие разборы, новости Exercism, истории сообщества и интервью с экспертами отрасли.
        - На [Twitch](https://exercism.org/r/twitch) мы проводим прямые трансляции с участием как нашего сообщества, так и гостей из мира программирования.

        Мы будем очень рады, если вы присоединитесь и станете активным участником нашего сообщества.
        Опытный вы разработчик или только начинаете, здесь есть место для вас.
        Так что не стесняйтесь, заходите поздороваться и участвуйте!

        С наилучшими пожеланиями,

        Jeremy Walker
        Сооснователь и CEO Exercism

        [Перейти в Exercism](%{root_url})
    onboarding_product:
      body_markdown: |-
        Здравствуйте,

        Прошёл примерно день с тех пор, как вы зарегистрировались на [Exercism](https://exercism.org), и я хотел узнать, как у вас пока дела?

        Иногда Exercism поначалу может немного ошеломлять. Некоторые люди слегка теряются, и что-то им не совсем понятно.
        Если вы застряли, загляните в наш [Discord](https://exercism.org/r/discord) или на [форум](https://exercism.org/r/forum), где можно попросить помощи.
        Нам всегда полезно знать, на чём люди спотыкаются, чтобы это исправить, так что, пожалуйста, не бойтесь сообщать!

        Если вы ещё не начали изучать какой-то язык, у нас их более 65 на выбор, включая самые распространённые (например, Python, JavaScript, C#), популярных новичков (например, Go, Elixir, Rust) и довольно необычные, эзотерические языки (например, 8th, COBOL, Prolog).
        Здесь есть чему поучиться и с чем повеселиться!

        И напоследок ещё раз напомню: Exercism на 100% бесплатен, с открытым исходным кодом и некоммерческий. Приятного пользования!

        С наилучшими пожеланиями,

        Jeremy Walker
        Сооснователь и CEO Exercism

        [Перейти в Exercism](%{root_url})
