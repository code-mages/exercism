    eligible_for_insiders:
      body_markdown: >
        Привет!


        Рад сообщить, что вы получили право на участие в Exercism Insiders -
        нашей программе поощрений для тех, кто вносит вклад, менторит или жертвует
        Exercism.

        Активировать аккаунт Insiders можно на [странице
        Insiders](%{insiders_url}).


        Insiders даёт три основных преимущества:

        1. Exercism Premium бесплатно. Теперь у вас есть доступ к тёмной теме,
        интеграции с ChatGPT, дополнительным слотам менторинга и не только.

        2. Закулисный контент. Вы сможете смотреть видео от меня и
        команды и быть в курсе того, как мы работаем над Exercism.

        3. Более близкий доступ к команде и ключевым участникам сообщества в нашем
        отдельном канале #insiders в Discord.


        На странице Insiders гораздо больше деталей!

        Ваш статус Insiders будет действовать до тех пор, пока вы активно
        вносите вклад, менторите или жертвуете.

        Вы также можете заработать пожизненный статус Insiders, достигнув
        определённых порогов.


        Огромное спасибо за то, что стали частью истории Exercism. Очень надеюсь, что вам
        понравится Insiders!


        Jeremy Walker

        Сооснователь и CEO Exercism


