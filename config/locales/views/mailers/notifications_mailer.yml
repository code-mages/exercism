    joined_exercism:
      body_markdown: |-
        Здравствуйте,

        Добро пожаловать в [Exercism](https://exercism.org)!
        Мы рады видеть вас частью нашего сообщества и с нетерпением ждём возможности помочь вам продвинуться ещё глубже в вашем пути в программировании.

