en:
  settings:
    show:
      account_settings:
        heading: Account Settings
        confirmation_email_sent: We've sent a confirmation email to %{email}
        resend_email_button: Resend email
        reset_account:
          heading: Reset account
          info_html:
            Resetting your account will <strong>reset your progress on all
            tracks,</strong> reset all exercises and remove access to all your
            previous mentoring.
        delete_account:
          heading: Delete account
          info_strong: This option will eliminate your account entirely with all data.
          info_text: You’ll get a chance to confirm your choice.
ru:
  settings:
    show:
      account_settings:
        heading: Настройки аккаунта
        confirmation_email_sent: Мы отправили письмо с подтверждением на %{email}
        resend_email_button: Отправить письмо повторно
        reset_account:
          heading: Сбросить аккаунт
          info_html:
            Сброс аккаунта <strong>сбросит ваш прогресс по всем
            трекам,</strong> сбросит все упражнения и удалит доступ ко всему
            вашему предыдущему менторству.
        delete_account:
          heading: Удалить аккаунт
          info_strong: Этот вариант полностью удалит ваш аккаунт со всеми данными.
          info_text: У вас будет возможность подтвердить свой выбор.
