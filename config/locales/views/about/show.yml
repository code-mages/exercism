en:
  about:
    hiring:
      meta_title: Exercism's Hiring!
      meta_description:
        Come and join a passionate team making programming education
        fun and effective. Here are some of the roles we’re hiring for.
      header:
        title: We're not currently hiring.
        description: Please check back in the future for new roles!
    show:
      meta_title: About Exercism
      meta_description: "Learn about Exercism: our vision, mission, and strategy."
      header:
        title: Exercism
        slogan:
          We’re building a place where anyone can learn and master programming for
          free, without ever feeling lost or stupid.
        donate_button: Donate to Exercism
      purpose_section:
        title: Purpose
        description: We're here to help everyone get really good at programming,
          regardless of their background. We want to share our love of
          programming, and help people upskill as part of their upward social
          mobility.
      goals_section:
        goal_1:
          title: Attain mastery
          description:
            We want people to experience the joy of programming — the deep
            satisfaction from being a fluent programmer.
        goal_2:
          title: Have Fun
          description:
            Developing programming skills should be empowering and fun, not
            competitive, frustrating or stressful.
        goal_3:
          title: Social Mobility
          description:
            We want everyone, especially the economically deprived, to achieve
            upward mobility through learning to code.
      principles_section:
        title: Principles
        principle_1: Exercism should be enjoyable, challenging and valuable.
        principle_2:
          Exercism should encourage a growth-mindset, clear and empathetic
          communication, and emphasize the value in learning together.
        principle_3: Exercism should feel safe and nurturing.
        principle_4:
          Exercism focusses on the learning journey, not the destination. The
          process and enjoyment of learning is more important than absolute
          factual correctness.
      leadership_section:
        title: How Exercism is run
        description:
          Exercism is developed through a mixture of top-down leadership and
          a collaborative community. We believe that most decisions are worth
          their taking time over, and so we think hard before we act.
        reflective:
          title: Reflective
          description:
            We focus on being strategy-driven and product-driven, looking to
            the long term, not just the immediate impact, and considering the
            holistic impact of decisions. We work closely with key volunteer
            contributors to canvas opinions and knowledge, understanding our
            strengths and weaknesses and trying to improve Exercism daily, while
            also staying focussed on our long-term vision.
        small_team:
          title: A small team with a big vision
          description:
            We also place a high focus on quality. We want what we do to be
            good - to work well, be accessible to all, and to be innovative. We
            have a tiny core team who take responsibility for ensuring that
            Exercism grows and evolves in line with its vision. Through
            donations from our community, philanthropists and philanthropic
            foundations, we are expanding our team in a sustainable and
            responsible way. We have funding milestones that we publicize and
            fundraise towards, which allow us to hire more people to develop
            further.
        ethics:
          title: Grounded in ethics
          description:
            We try to pay fairly, respecting and considering both the time and
            value of our staff and the generosity of our donors. We act
            ethically as a company and as an employer, treating our team with
            respect and never asking something of them that we wouldn’t do
            ourselves, and not using techniques or technologies that we wouldn't
            want used on us.
      donate_section:
        title: Help us bring the joy of programming to everyone, everywhere ✨
        description:
          We rely on open-source contributions and cash donations to achieve
          our mission. Can you spare some time or money to support our mission?
        donate_button: Donate to Exercism
        tasks_button: See tasks that need help
ru:
  about:
    hiring:
      meta_title: В Exercism открыт набор!
      meta_description:
        Присоединяйтесь к увлечённой команде, которая делает обучение
        программированию интересным и эффективным. Вот некоторые из вакансий, на которые мы ищем людей.
      header:
        title: Сейчас мы не набираем сотрудников.
        description: Загляните позже, чтобы увидеть новые вакансии!
    show:
      meta_title: О Exercism
      meta_description: "Узнайте об Exercism: наше видение, миссия и стратегия."
      header:
        title: Exercism
        slogan:
          Мы создаём место, где каждый может учиться и осваивать программирование
          бесплатно, ни разу не почувствовав себя потерянным или глупым.
        donate_button: Поддержать Exercism
      purpose_section:
        title: Наша цель
        description: Мы здесь, чтобы помочь каждому по-настоящему хорошо освоить
          программирование, независимо от бэкграунда. Мы хотим поделиться своей
          любовью к программированию и помочь людям повысить квалификацию как часть
          их социального роста.
      goals_section:
        goal_1:
          title: Достичь мастерства
          description:
            Мы хотим, чтобы люди испытали радость программирования, глубокое
            удовлетворение от того, что свободно владеешь кодом.
        goal_2:
          title: Получать удовольствие
          description:
            Развитие навыков программирования должно давать силы и приносить
            удовольствие, а не быть соревнованием, источником разочарования или стресса.
        goal_3:
          title: Социальная мобильность
          description:
            Мы хотим, чтобы каждый, особенно люди в трудном материальном положении,
            добивался социального роста, обучаясь программированию.
      principles_section:
        title: Принципы
        principle_1: Exercism должен приносить удовольствие, бросать вызов и быть полезным.
        principle_2:
          Exercism должен поощрять установку на рост, ясное и чуткое
          общение и подчёркивать ценность совместного обучения.
        principle_3: Exercism должен ощущаться безопасным и поддерживающим.
        principle_4:
          Exercism сосредоточен на пути обучения, а не на его конечной точке.
          Сам процесс и удовольствие от обучения важнее абсолютной
          фактической точности.
      leadership_section:
        title: Как устроена работа Exercism
        description:
          Exercism развивается благодаря сочетанию руководства сверху вниз и
          совместной работы сообщества. Мы верим, что большинство решений стоят
          того, чтобы уделить им время, поэтому мы хорошо думаем, прежде чем действовать.
        reflective:
          title: Вдумчивость
          description:
            Мы стремимся руководствоваться стратегией и продуктом, смотреть
            в долгосрочную перспективу, а не только на сиюминутный результат, и
            учитывать целостное влияние решений. Мы тесно работаем с ключевыми
            добровольцами, чтобы собирать мнения и знания, понимая наши
            сильные и слабые стороны и стараясь улучшать Exercism каждый день, при этом
            не теряя из виду наше долгосрочное видение.
        small_team:
          title: Небольшая команда с большим видением
          description:
            Мы также уделяем большое внимание качеству. Мы хотим, чтобы то, что мы
            делаем, было хорошим, работало отлично, было доступно всем и было
            инновационным. У нас есть крохотная основная команда, которая берёт на себя
            ответственность за то, чтобы Exercism рос и развивался в соответствии со своим
            видением. Благодаря пожертвованиям нашего сообщества, меценатов и благотворительных
            фондов мы расширяем команду устойчивым и
            ответственным образом. У нас есть финансовые вехи, о которых мы объявляем и
            на которые собираем средства, что позволяет нам нанимать больше людей для дальнейшего развития.
        ethics:
          title: Опора на этику
          description:
            Мы стараемся платить справедливо, уважая и учитывая как время и
            ценность наших сотрудников, так и щедрость наших доноров. Мы действуем
            этично как компания и как работодатель, относясь к команде с
            уважением и никогда не прося от них того, чего не сделали бы
            сами, и не используя приёмы или технологии, которые не хотели бы,
            чтобы применяли к нам.
      donate_section:
        title: Помогите нам принести радость программирования всем и всюду ✨
        description:
          Мы полагаемся на вклад open-source и денежные пожертвования, чтобы достичь
          нашей миссии. Можете ли вы уделить немного времени или средств, чтобы поддержать нашу миссию?
        donate_button: Поддержать Exercism
        tasks_button: Посмотреть задачи, которым нужна помощь
