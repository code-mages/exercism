en:
  about:
    hiring_front_end_developer:
      meta_title: "Become Exercism's Front-end Developer"
      meta_description: "We're looking for some who loves building React and CSS to continue to develop Exercism's front-end. Do you take pride in building pixel-perfect UIs that work reliably and performantly? Do you have a passion for programming and a growth mindset? If so, this role might be perfect for you."
      back_to_listings: "Back to All Job Listings"
      role_title: "Lead Front-end Developer (React + CSS)"
      remote: "100% remote"
      salary: "Salary: £50k (~$68k, ~€60k)"
      intro_lead: "Become Exercism's Front-end Developer!"
      intro_body: "We're looking for some who loves building React and CSS to continue to develop Exercism's front-end. Do you take pride in building pixel-perfect UIs that work reliably and performantly? Do you have a passion for programming and a growth mindset? If so, this role might be perfect for you."
      summary_heading: "Summary"
      summary_p1_html: "Exercism is a not-for-profit organisation providing world-class programming education to anyone for free. Our online platform is centred around self-directed learning and volunteer mentoring, and has nearly one million members. Over the next 5 years, we want to become the defacto programming education platform that anyone, anywhere can use for free. Through our work we aim to improve the global standard of programming and increase participation in tech from under-represented groups. You can learn more about Exercism in our %{about_link}."
      summary_p2: "Exercism is a complex, highly-technical platform, with production code running in over 40 languages. From our users' perspective, however, it's an easy-to-use website that helps them improve their programming skills. We take pride in hiding all that complexity, and making Exercism feel as lightweight and beautiful as we can. We're looking for someone to take the lead in the continued development of Exercism's front-end, implementing designs to a pixel-perfect standard in CSS, and writing fast, performant and readable React code."
      summary_p3: "We are building an exceptional team of ambitious, passionate people who love their work, excel at what they do, and have fun doing it. The values of empathy, integrity and personal-growth are core to everything we do. If that sounds exciting to be part of, and you feel you have the skills to help, we'd love for you to apply."
      responsibilities_heading: "Responsibilities"
      responsibilities_intro: "You have two core responsibilities:"
      responsibilities_core_1: "Create performant interactive components in React."
      responsibilities_core_2: "Implementing designs to a pixel-perfect standard in HTML/CSS."
      responsibilities_variety: "As Exercism is a large and complex site, there is a huge variety in the things we work on day-to-day. Here is an idea of some of the things you'll work on through the first 12 months:"
      responsibilities_task_1: "Creating a new UI for admins to manage automated mentoring"
      responsibilities_task_2: "Implementing dark-theme throughout the site"
      responsibilities_task_3: "Making the logged-in part of the website responsive"
      responsibilities_task_4: 'Make the code editor "multiplayer"'
      responsibilities_task_5: "Add a section to allow people to create research profile"
      responsibilities_task_6_html: 'Scan through <a href="https://github.com/exercism/exercism/issues">open issues</a> for an idea of what the community are hoping comes next!'
      responsibilities_stack: "We use TypeScript, so it will help if you are comfortable with it. If you only know JavaScript, there's a small learning curve you'll need to take, which we will help you with. For CSS we use Tailwind. If you've not used it before then there is only a small learning-curve from CSS3 or another preprocessor such as SASS."
      responsibilities_community: "In addition to the technical work, you'll also work closely with rest of Exercism's team as we decide how to evolve the platform. We'll encourage you to get involved in our wider community, to tap into their collective knowledge and experience, but this isn't compulsary."
      fit_heading: "Is this job right for you?"
      fit_p1: "The right person for this role will be someone who loves programming, is passionate about education, and who shares our values."
      fit_p2: "At a technical level, we're not worried about your background or qualifications - what matters to us is that you'll be able to elevate the quality of Exercism. The easiest way to know if this is a good fit for you is to spend some time using Exercism and ask yourself two questions:"
      fit_question_1: "Would I be excited to work on this?"
      fit_question_2: "Could I have developed this myself and done as good a job (or hopefully an even better one)?"
      fit_p3: "If the answer to those two questions is yes, then you probably have the requisite technical skills. What matters then is whether you'll enjoy working in our team. There are a few principles that underpin how we work. If these sound exciting to you, then you'll probably enjoy working with us:"
      fit_principle_1: "We take on high levels of personal responsibility and work autonomously. We discuss problems and ideas with other if we get stuck, but don't pair-program."
      fit_principle_2: "We have a strong tendency towards pragmatism, and tend to make decisions that optimize for the bigger picture over situational-perfection."
      fit_principle_3: "We write code that makes it easy for others in the team to work with. We choose standards and stick to them. We generally prioritize developer-happiness over technical optimisation."
      fit_principle_4: "We are dedicated to continous personal development. We each have intrinsic drives to learn, grow and elevate our standards."
      fit_principle_5: "We believe and trust in each other, support each other, and make time for each other."
      fit_p4: "In additon to these things, our whole team have a shared commitment to kindness, honesty, and curiosity, and strive to build a working environment where everyone can learn, improve and do their best work. We believe that everyone has the right to feel happy, safe and supported at work, and strive to ensure that is the case at Exercism. We celebrate diversity, and do better work because of the different perspectives and insights that different experiences bring. It's important to us that you share these values and want to be part of a team living them out."
      fit_p5: "Finally, we want to hire someone who can get passionate about Exercism. We care deeply about what we're building - about creating a world-class educational resource that everyone can use for free, and it matters to us that everyone in the team shares that passion."
      other_heading: "Other requirements"
      other_p1: "We are a fully remote team who communicate in English. We aim to mix effective work with a sense of connectedness, so spend some time during the week on video calls sharing ideas and updates, some time doing simpler work while being on Slack, and some time offline focusing on deeper work."
      other_p2: "These lead to the following extra requirements:"
      other_req_1: "Able to work at least 4 hours per day during 9am - 6pm UTC, to enable you to interact with the rest of the team."
      other_req_2: "You are willing to travel once per year for an in-person meetup."
      other_req_3_html: 'You are comfortable speaking English, and could write English to a level similar to <a href="https://github.com/exercism/elixir/blob/main/exercises/concept/lasagna/.docs/introduction.md" target="_blank" rel="noreferrer">this</a>.'
      other_req_4: "You are excited to work in a diverse, inclusive team that cares about culture and where honest, empathic communication is the norm, and self-improvement is a lived value."
      other_encouragement_html: "Research has shown that people from under-represented groups are less likely to apply for jobs if they don't feel they fit <strong>all</strong> of the criteria. If you think you'd enjoy the role and could do a good job, but are not sure if you're fully qualified, please apply anyway!"
      benefits_heading: "Benefits"
      benefits_intro: "Treating each other fairly is at the core of our individual and company values, and we want the pay and benefits of Exercism to reflect that. We offer the same benefits to all Exercism employees."
      benefits_1: "A truly flexible, remote-first, working culture."
      benefits_2: "A collaborative, creative and inspiring working environment. No shouty bosses, presenteeism or unexpected deadlines."
      benefits_3: "£50k starting salary, which increases each year (inflation + 2%)."
      benefits_4: "Matched pension contributions up to 3%."
      benefits_5: "35 days holiday."
      benefits_6: "We will pay for access to a local co-working space (if desired)."
      benefits_hours: "The role is full time, but you may choose to work either 5 days (~40 hours) per week or 4 days (~32 hours) per week. If you opt for the shorter working week, salary and holiday will be prorated accordingly."
      apply_heading: "How to apply"
      apply_thanks: "Firstly, if you're about to apply, thank you! We're grateful and excited that you're taking the time to do so 🙂"
      apply_challenge_html: "We're expecting a high number of applicants for this role, and so are asking everyone to submit an implementation of a programming challenge that will allow you to demonstrate your CSS and React skills. You can read the %{challenge_link}."
      apply_email_lead: "To apply send an email to"
      apply_email_trail: "with:"
      apply_item_subject: 'Subject of "Front-end developer"'
      apply_item_intro: "A couple of paragraphs introducing yourself and providing some brief background."
      apply_item_video_lead: "A link to a short video introducing yourself in more detail, telling us why you're interested joining Exercism, and giving us some more information on your experience and why you're right for the role."
      apply_item_video_trail_html: "Don't worry about the quality of the video itself! Try and keep it around 5-10 minutes long. We use %{loom_link} for easy recording and sharing."
      apply_item_code: "A link to your Challenge code (preferably on GitHub)."
      apply_item_solution: "A link to your Challenge solution hosted online (GitHub pages works for free for this)."
      process_intro: "The application process will run as follows:"
      process_1: "You send in your application."
      process_2: "We'll get in touch to acknowledge receipt of your application (generally within 2 working days)"
      process_3: "We'll review your application and let you know whether we wish to continue the process with you (generally within 7 working days)."
      process_4: "We will send you a questionnaire to try and understand more about your experience."
      process_5: "Based on initial applications and questionnaires, we'll invite a final set of applicants to have a video interview with the CEO."
      process_6: "We hope to make a final decision on who we offer the role to by the end of April."
ru:
  about:
    hiring_front_end_developer:
      meta_title: "Станьте фронтенд-разработчиком Exercism"
      meta_description: "Мы ищем человека, который любит React и CSS, чтобы продолжить развитие фронтенда Exercism. Вам важно делать pixel-perfect интерфейсы, которые работают надёжно и быстро? У вас есть страсть к программированию и настрой на рост? Если да, эта роль может подойти вам идеально."
      back_to_listings: "Назад ко всем вакансиям"
      role_title: "Ведущий фронтенд-разработчик (React + CSS)"
      remote: "100% удалённо"
      salary: "Зарплата: £50k (~$68k, ~€60k)"
      intro_lead: "Станьте фронтенд-разработчиком Exercism!"
      intro_body: "Мы ищем человека, который любит React и CSS, чтобы продолжить развитие фронтенда Exercism. Вам важно делать pixel-perfect интерфейсы, которые работают надёжно и быстро? У вас есть страсть к программированию и настрой на рост? Если да, эта роль может подойти вам идеально."
      summary_heading: "Кратко"
      summary_p1_html: "Exercism, это некоммерческая организация, дающая программистское образование мирового уровня всем и бесплатно. Наша онлайн-платформа построена вокруг самостоятельного обучения и менторства волонтёров, и у неё почти миллион участников. В ближайшие 5 лет мы хотим стать главной образовательной платформой по программированию, которой сможет пользоваться бесплатно любой человек в любой точке мира. Своей работой мы стремимся повысить общемировой уровень программирования и увеличить участие в IT со стороны недостаточно представленных групп. Больше об Exercism можно узнать на наших %{about_link}."
      summary_p2: "Exercism, это сложная, высокотехнологичная платформа, где боевой код работает более чем на 40 языках. Но с точки зрения пользователей это простой в использовании сайт, который помогает им улучшать навыки программирования. Мы гордимся тем, что прячем всю эту сложность и делаем Exercism настолько лёгким и красивым, насколько можем. Мы ищем человека, который возьмёт на себя ведущую роль в дальнейшем развитии фронтенда Exercism, воплощая дизайны с pixel-perfect точностью в CSS и написав быстрый, производительный и читаемый код на React."
      summary_p3: "Мы строим исключительную команду амбициозных, увлечённых людей, которые любят свою работу, отлично её делают и получают от этого удовольствие. Ценности эмпатии, честности и личного роста лежат в основе всего, что мы делаем. Если вам хочется быть частью этого и вы чувствуете, что можете помочь своими навыками, мы будем рады вашей заявке."
      responsibilities_heading: "Обязанности"
      responsibilities_intro: "У вас две ключевые обязанности:"
      responsibilities_core_1: "Создавать производительные интерактивные компоненты на React."
      responsibilities_core_2: "Воплощать дизайны с pixel-perfect точностью на HTML/CSS."
      responsibilities_variety: "Поскольку Exercism, это большой и сложный сайт, работа изо дня в день очень разнообразна. Вот примерное представление о том, над чем вы поработаете в первые 12 месяцев:"
      responsibilities_task_1: "Создание нового интерфейса для админов по управлению автоматическим менторством"
      responsibilities_task_2: "Внедрение тёмной темы по всему сайту"
      responsibilities_task_3: "Адаптивная вёрстка залогиненной части сайта"
      responsibilities_task_4: 'Сделать редактор кода "многопользовательским"'
      responsibilities_task_5: "Добавить раздел, позволяющий людям создавать исследовательский профиль"
      responsibilities_task_6_html: 'Просмотрите <a href="https://github.com/exercism/exercism/issues">открытые issues</a>, чтобы понять, чего сообщество ждёт дальше!'
      responsibilities_stack: "Мы используем TypeScript, поэтому будет плюсом, если вам с ним комфортно. Если вы знаете только JavaScript, вам предстоит небольшая кривая обучения, с которой мы поможем. Для CSS мы используем Tailwind. Если вы им раньше не пользовались, кривая обучения после CSS3 или другого препроцессора вроде SASS совсем небольшая."
      responsibilities_community: "Помимо технической работы вы будете тесно взаимодействовать с остальной командой Exercism, когда мы решаем, как развивать платформу. Мы будем поощрять вас вовлекаться в наше более широкое сообщество, чтобы черпать его коллективные знания и опыт, но это не обязательно."
      fit_heading: "Подходит ли вам эта работа?"
      fit_p1: "Подходящий человек для этой роли, это тот, кто любит программирование, увлечён образованием и разделяет наши ценности."
      fit_p2: "На техническом уровне нас не волнует ваш бэкграунд или дипломы, для нас важно, чтобы вы могли поднять качество Exercism. Проще всего понять, подходит ли это вам, провести какое-то время, пользуясь Exercism, и задать себе два вопроса:"
      fit_question_1: "Было бы мне интересно работать над этим?"
      fit_question_2: "Смог бы я разработать это сам и сделать так же хорошо (а лучше даже лучше)?"
      fit_p3: "Если ответ на оба вопроса, да, то у вас, вероятно, есть нужные технические навыки. Дальше важно, понравится ли вам работать в нашей команде. Есть несколько принципов, на которых строится наша работа. Если они вам близки, вам, вероятно, будет комфортно работать с нами:"
      fit_principle_1: "Мы берём на себя высокий уровень личной ответственности и работаем автономно. Мы обсуждаем проблемы и идеи с другими, если застреваем, но не занимаемся парным программированием."
      fit_principle_2: "У нас сильная склонность к прагматизму, и мы обычно принимаем решения, оптимизирующие общую картину, а не идеальность в конкретной ситуации."
      fit_principle_3: "Мы пишем код, с которым другим в команде легко работать. Мы выбираем стандарты и придерживаемся их. Мы, как правило, ставим счастье разработчиков выше технической оптимизации."
      fit_principle_4: "Мы преданы непрерывному личному развитию. У каждого из нас есть внутреннее стремление учиться, расти и поднимать свои стандарты."
      fit_principle_5: "Мы верим и доверяем друг другу, поддерживаем друг друга и находим время друг для друга."
      fit_p4: "Помимо этого, вся наша команда разделяет общую приверженность доброте, честности и любопытству и стремится строить рабочую среду, где каждый может учиться, совершенствоваться и делать свою лучшую работу. Мы верим, что каждый имеет право чувствовать себя счастливым, в безопасности и с поддержкой на работе, и стремимся, чтобы так и было в Exercism. Мы ценим разнообразие и делаем работу лучше благодаря разным взглядам и озарениям, которые приносит разный опыт. Нам важно, чтобы вы разделяли эти ценности и хотели быть частью команды, которая ими живёт."
      fit_p5: "Наконец, мы хотим нанять человека, который может по-настоящему увлечься Exercism. Нам глубоко небезразлично то, что мы строим, создание образовательного ресурса мирового уровня, которым каждый может пользоваться бесплатно, и нам важно, чтобы эту страсть разделял каждый в команде."
      other_heading: "Другие требования"
      other_p1: "Мы полностью удалённая команда, которая общается на английском. Мы стремимся сочетать эффективную работу с ощущением единства, поэтому часть времени в течение недели проводим на видеозвонках, делясь идеями и обновлениями, часть времени делаем более простую работу, оставаясь на связи в Slack, а часть времени офлайн сосредотачиваемся на более глубокой работе."
      other_p2: "Из этого вытекают следующие дополнительные требования:"
      other_req_1: "Возможность работать хотя бы 4 часа в день в промежутке с 9:00 до 18:00 UTC, чтобы взаимодействовать с остальной командой."
      other_req_2: "Вы готовы раз в год ездить на офлайн-встречу команды."
      other_req_3_html: 'Вам комфортно говорить по-английски, и вы могли бы писать на английском на уровне, похожем на <a href="https://github.com/exercism/elixir/blob/main/exercises/concept/lasagna/.docs/introduction.md" target="_blank" rel="noreferrer">этот</a>.'
      other_req_4: "Вам интересно работать в разнообразной, инклюзивной команде, которой важна культура, где честное, эмпатичное общение, это норма, а саморазвитие, это живая ценность."
      other_encouragement_html: "Исследования показывают, что люди из недостаточно представленных групп реже подают заявки на работу, если чувствуют, что не подходят под <strong>все</strong> критерии. Если вам кажется, что роль вам понравилась бы и вы могли бы хорошо справиться, но вы не уверены, что полностью подходите, всё равно откликайтесь!"
      benefits_heading: "Условия"
      benefits_intro: "Справедливое отношение друг к другу лежит в основе наших личных и корпоративных ценностей, и мы хотим, чтобы оплата и условия в Exercism это отражали. Мы предлагаем одинаковые условия всем сотрудникам Exercism."
      benefits_1: "По-настоящему гибкая, remote-first рабочая культура."
      benefits_2: "Совместная, творческая и вдохновляющая рабочая среда. Никаких орущих начальников, показной занятости и внезапных дедлайнов."
      benefits_3: "Стартовая зарплата £50k, которая растёт каждый год (инфляция + 2%)."
      benefits_4: "Софинансирование пенсионных отчислений до 3%."
      benefits_5: "35 дней отпуска."
      benefits_6: "Мы оплатим доступ к местному коворкингу (по желанию)."
      benefits_hours: "Роль на полную занятость, но вы можете выбрать работать либо 5 дней (~40 часов) в неделю, либо 4 дня (~32 часа) в неделю. Если вы выберете более короткую рабочую неделю, зарплата и отпуск будут пропорционально пересчитаны."
      apply_heading: "Как откликнуться"
      apply_thanks: "Прежде всего, если вы собираетесь откликнуться, спасибо! Мы благодарны и рады, что вы уделяете этому время 🙂"
      apply_challenge_html: "Мы ожидаем большое число откликов на эту роль, поэтому просим всех прислать реализацию программного задания, которое позволит вам продемонстрировать навыки CSS и React. Прочитать %{challenge_link} можно по ссылке."
      apply_email_lead: "Чтобы откликнуться, отправьте письмо на"
      apply_email_trail: "со следующим:"
      apply_item_subject: 'Тема письма "Front-end developer"'
      apply_item_intro: "Пара абзацев, представляющих вас и дающих краткую вводную о вас."
      apply_item_video_lead: "Ссылка на короткое видео, где вы подробнее представляете себя, рассказываете, почему вам интересно присоединиться к Exercism, и делитесь чуть большей информацией о своём опыте и о том, почему вы подходите на эту роль."
      apply_item_video_trail_html: "Не переживайте о качестве самого видео! Постарайтесь уложиться примерно в 5-10 минут. Для удобной записи и обмена мы используем %{loom_link}."
      apply_item_code: "Ссылку на код вашего задания (желательно на GitHub)."
      apply_item_solution: "Ссылку на решение задания, размещённое онлайн (для этого бесплатно подойдёт GitHub Pages)."
      process_intro: "Процесс рассмотрения заявок будет таким:"
      process_1: "Вы присылаете свою заявку."
      process_2: "Мы свяжемся, чтобы подтвердить получение вашей заявки (обычно в течение 2 рабочих дней)"
      process_3: "Мы рассмотрим вашу заявку и сообщим, хотим ли продолжить процесс с вами (обычно в течение 7 рабочих дней)."
      process_4: "Мы пришлём вам анкету, чтобы больше узнать о вашем опыте."
      process_5: "На основе первичных заявок и анкет мы пригласим финальную группу кандидатов на видеоинтервью с CEO."
      process_6: "Мы надеемся принять окончательное решение о том, кому предложим роль, к концу апреля."
