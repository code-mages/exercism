en:
  about:
    impact:
      meta_title: Exercism's Impact Report
      meta_description:
        We've provided over 310 million minutes of free learning to
        over a million people. Learn more in our impact report!
      header:
        title: Exercism Impact Report
        provided_text_html: >
          We've provided %{highlight_open}%{count}%{highlight_close}
          %{highlight_unit_open}minutes%{highlight_unit_close}
          of free education.
        daily_minutes_provided: And we provide another ~285,340 minutes every day!
        funding_info: All on a free, open source project funded by people like you.
      stats:
        students: Students
        exercise_submissions: Exercise Submissions
        mentoring_discussions: Mentoring Discussions
      languages_taught:
        Exercism teaches %{num_languages} programming languages from
        %{first_language} to %{last_language}, using a unique blend of learning,
        practicing, and mentoring.
      everything_is_free: Everything on Exercism is 100% free.
      live_activity: Live activity on Exercism
      testimonials:
        dapritchard_html: >-
          %{twitter_handle} is really incredible. My submission was failing its tests…
          I asked for mentoring to help straighten things out, and within 15 minutes
          someone had messaged me explaining my error.
        zippkode_html: >-
          …I worked on the Ruby strings exercises at %{twitter_handle} This
          platform forces me to slow down and actually logically solve the
          tasks…
        alebaffa_html: >-
          I've always loved %{twitter_handle} because you learn not only the
          syntax of a language, but also its dev environment: how to setup
          tests, packaging and build. Fantastic resource!
      volunteers_section:
        title: Exercism is powered by huge team of wonderful volunteers.
        mentors_label: Mentors
        code_contributors_label: Code Contributors
        full_time_staff_label: Full-time Staff
      support_section:
        emoji_aria_label: Clapping Hands
        call_to_action_title: Has Exercism helped you become a better developer?
        call_to_action_paragraph_one:
          If Exercism has helped your career prospects or
          given you joy, please consider financially supporting us.
        call_to_action_paragraph_two: Only 1% of people that use Exercism support us. Please be one of them.
        support_button: See how you can support us
      partners_section:
        title: A special thanks to these organisations…
        donors_sentence_html: >
          And over <a href="%{donors_url}" class="underline hover:text-lightBlue">700 individual donors!</a>
      growth_section:
        title: We've grown to over %{num_users} students entirely by word of mouth.
        description:
          We work closely with our community to understand how to evolve
          Exercism to be the best it can be, and they reward us by sharing with
          their friends.
      mission_cta:
        title: Become rocket fuel for our mission
        description:
          We've built everything for under $500,000. Imagine what we could do
          with more significant funding! Could you be the one to make it happen?
        organization_support_title: Interested in supporting Exercism as an organisation?
        contact_prefix: Get in touch with
        contact_suffix: Co-founder & CEO
      testimonials_section:
        title: Over 85,000 students have left testimonials to thank their mentors.
ru:
  about:
    impact:
      meta_title: Отчёт о влиянии Exercism
      meta_description:
        Мы предоставили более 310 миллионов минут бесплатного обучения
        более чем миллиону человек. Узнайте больше в нашем отчёте о влиянии!
      header:
        title: Отчёт о влиянии Exercism
        provided_text_html: >
          Мы предоставили %{highlight_open}%{count}%{highlight_close}
          %{highlight_unit_open}минут%{highlight_unit_close}
          бесплатного образования.
        daily_minutes_provided: И мы предоставляем ещё примерно 285 340 минут каждый день!
        funding_info: И всё это в рамках бесплатного проекта с открытым исходным кодом, который финансируют такие же люди, как вы.
      stats:
        students: Учащиеся
        exercise_submissions: Отправленные решения упражнений
        mentoring_discussions: Обсуждения с наставниками
      languages_taught:
        Exercism обучает %{num_languages} языкам программирования, от
        %{first_language} до %{last_language}, используя уникальное сочетание обучения,
        практики и наставничества.
      everything_is_free: Всё на Exercism на 100% бесплатно.
      live_activity: Активность на Exercism в реальном времени
      testimonials:
        dapritchard_html: >-
          %{twitter_handle} просто невероятен. Моё решение не проходило тесты…
          Я попросил помощи у наставника, чтобы разобраться, и в течение 15 минут
          мне написали и объяснили мою ошибку.
        zippkode_html: >-
          …Я работал над упражнениями по строкам в Ruby на %{twitter_handle} Эта
          платформа заставляет меня замедлиться и действительно логически решать
          задачи…
        alebaffa_html: >-
          Я всегда любил %{twitter_handle}, потому что здесь ты изучаешь не только
          синтаксис языка, но и его среду разработки: как настроить
          тесты, упаковку и сборку. Потрясающий ресурс!
      volunteers_section:
        title: Exercism работает благодаря огромной команде замечательных волонтёров.
        mentors_label: Наставники
        code_contributors_label: Контрибьюторы кода
        full_time_staff_label: Штатные сотрудники
      support_section:
        emoji_aria_label: Аплодирующие руки
        call_to_action_title: Помог ли вам Exercism стать лучшим разработчиком?
        call_to_action_paragraph_one:
          Если Exercism помог вашим карьерным перспективам или
          принёс вам радость, пожалуйста, подумайте о том, чтобы поддержать нас финансово.
        call_to_action_paragraph_two: Только 1% людей, которые пользуются Exercism, поддерживают нас. Пожалуйста, станьте одним из них.
        support_button: Узнайте, как вы можете нас поддержать
      partners_section:
        title: Особая благодарность этим организациям…
        donors_sentence_html: >
          И более <a href="%{donors_url}" class="underline hover:text-lightBlue">700 индивидуальным жертвователям!</a>
      growth_section:
        title: Мы выросли до более чем %{num_users} учащихся исключительно благодаря сарафанному радио.
        description:
          Мы тесно работаем с нашим сообществом, чтобы понять, как развивать
          Exercism, чтобы он был настолько хорош, насколько это возможно, и они вознаграждают нас, делясь
          с друзьями.
      mission_cta:
        title: Станьте ракетным топливом для нашей миссии
        description:
          Мы построили всё это менее чем за 500 000 долларов. Представьте, что мы могли бы сделать
          при более значительном финансировании! Могли бы вы стать тем, кто воплотит это в жизнь?
        organization_support_title: Хотите поддержать Exercism как организация?
        contact_prefix: Свяжитесь с
        contact_suffix: Сооснователь и CEO
      testimonials_section:
        title: Более 85 000 учащихся оставили отзывы, чтобы поблагодарить своих наставников.
