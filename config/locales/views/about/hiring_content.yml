        process_intro: 'Процесс отбора проходит так:'
        process_one: Вы присылаете свою заявку.
        process_two: Мы свяжемся с вами, чтобы подтвердить получение заявки (обычно в течение 2 рабочих дней)
        process_three: Мы рассмотрим вашу заявку и сообщим, хотим ли мы продолжить процесс с вами (обычно в течение 7 рабочих дней).
        process_four: Мы пришлём вам анкету, чтобы больше узнать о вашем опыте, а затем изучим ответы.
        process_five: Если вы не написали статью на одну из четырёх тем выше, мы попросим вас это сделать, а затем изучим эту статью.
