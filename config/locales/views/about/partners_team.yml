en:
  about:
    partners:
      packt:
        see_all_supporters: See all our supporters
        supported_by_prefix: Exercism is supported by
        org_supports_exercism: "%{org_name} supports Exercism"
        packt_partnership_description:
          Packt Publishing are a core Exercism partner,
          helping us develop both the fundraising and content side of the
          platform. They have sponsored our new Fundraising role, and we are
          currently developing a deeper partnership which we will launch in
          early 2022.
        about_packt_publishing: About Packt Publishing
        packt_about_p1:
          Packt is a tech publisher focused on the practical application
          of technology. Packt authors are mostly working developers who do the
          job of sorting out what actually works and how to get things done with
          the endless stream of new technology. Packt readers and users are busy
          working engineers building solutions and applications, who want to
          know whether how a technology works in practice, and whether it’s
          worth using.
        packt_about_p2:
          Packt supports Exercism in its mission to ease the path to
          fluency across languages. We share the Exercism values of independence
          from any one platform or language, and the belief in the desire of
          engineers to support and help each other as a peer community. Packt
          books and publishing aim to provide a structured body of practical
          knowledge to complement fantastic platforms like Exercism. We both
          provide a way for experienced professionals to share knowledge and
          experience with the tech broader community.
    team:
      meta_title: Exercism's Team
      meta_description: Learn who runs Exercism, out trustees, leadership and full-time time.
      our_team: Our Team
      built_by_people_worldwide: Exercism is built by people from all over the world 🙌
      stats:
        contributors: Over %{count} contributors
        countries: "%{count} countries"
        github_repos: "%{count} GitHub repositories"
      map_alt_text: A world map containing avatars of Exercism contributors
      info_box:
        title: Thousands of people have supported our vision and helped build Exercism.
        description:
          Exercism relies on leadership team and staff, a wider team of
          approximately one hundred maintainers and key contributors, and small
          contributions from thousands of individuals. Beyond these
          contributions to our product, tens of thousands of members of our
          community have contributed by giving feedback and help to others.
      leadership_team:
        title: Leadership Team
        description:
          Our leadership team manage the strategic and organisational sides
          of Exercism. They are responsible for fulfilling our mission statement
          and maintaining our values.
        katrina_owen:
          image_alt: An image of Katrina
          handle: Co-founder & Director
          bio_html: >-
            Katrina is the original creator of Exercism. She is co-author of
            %{book_link}. Polyglot developer and Ruby Hero award winner, with a
            degree in Molecular Biology. Cares deeply about open-source and
            contributes to several projects outside of Exercism.
          book_link_text: 99 Bottles of OOP
          personal_site_link: Katrina's Personal Site
        jeremy_walker:
          image_alt: An image of Jeremy Walker
          handle: Co-founder & CEO
          bio_html: >-
            Jeremy is an entrepreneur and software developer, who's passionate about
            equality and opportunity. He has co-founded various organisations,
            including Meducation, Wondr Medical, and %{kaido_link}, and holds a
            patent for AI used in heart surgery.
          personal_site_link: Jeremy's Personal Site
      staff_team:
        title: Staff
        description:
          Our staff manage our website, the CLI and the operational side of
          Exercism, ensuring that we provide a safe and reliable experience for
          everyone using Exercism.
        erik_schierboom:
          image_alt: An image of Erik Schierboom
          handle: Head of Open Source
          bio_html: >-
            Erik is a polyglot developer who loves learning new languages. He builds
            the software and infrastructure that powers the open-source elements
            of the platform, ensuring each track is a joy to work with. He was a
            top Exercism volunteer before joining full-time.
          personal_site_link: Erik's personal site
        aron_demeter:
          image_alt: An image of Aron Demeter
          handle: Front-end Developer
          bio_html: >-
            Áron is a self-taught developer who gets excited about discovering
            interrelations between things. He has a Master's degree in classical
            piano performance. In his freetime he enjoys spending time with his
            family, learning new languages on Exercism or listening to an opera.
      alumni_team:
        title: Alumni
        description:
          People who have previously worked full-time at Exercism and since
          moved onto new adventures. Their legacies are gratefully remembered!
        nicole_chalmers:
          image_alt: An image of Nicole Chalmers
          bio_html: >-
            Nicole is the Head of Product at %{kaido_link}. She spent two years as Head
            of Product for Exercism, guiding us from v1 to v2, and helping set
            the principles and ideas that still drive Exercism today.
        charles_care:
          image_alt: An image of Charles Care
          bio:
            Charles was part of the team that built Exercism v2, working specifically
            on the server-side code and infrastructure. He helped build out the
            first version of our automated mentoring platform, and Github
            integration.
        karlo_soriano:
          image_alt: An image of Karlo Soriano
          bio:
            Karlo worked on the website part of Exercism. He created most of the
            website's interactive frontend for v3, and contributed to much of
            the Rails backend platform.
        taiyab_raja:
          image_alt: An image of Taiyab Raja
          bio:
            Taiyab is designer behind the beautiful visuals and UX of Exercism v3. He
            enjoys all things startups, design and entrepreneurship.
        loretta_murray:
          image_alt: An image of Loretta Murray
          bio:
            Loretta was Exercism's Head of Fundraising during 2022-2023. She's
            motivated by the transformational power of fundraising and is a
            qualified business coach with a passion for developing
            fundraisers' skills.
        jonathan_middleton:
          image_alt: An image of Jonathan Middleton
          bio:
            Jonathan was Exercism's Community Manager during 2022-2023. He loves
            connecting with people and hearing stories of how people are where
            they are in life. He is curious to learn and has been slowly getting
            to grips with programming.
      community_teams:
        maintainers:
          title: Track Maintainers
          description:
            Our maintainers are the linchpins of the language tracks and
            exercises on Exercism. They create and organize exercises for each
            of our %{num_lang} languages and help guide us to ensure Exercism teaches
            students in the most idiomatic way possible.
          link_text: See all Exercism maintainers
        mentors:
          title: Mentors
          description:
            Our mentors are the human element behind Exercism, providing
            empathetic feedback on learners' solutions. They are the magic that
            makes Exercism come alive.
          link_text: See all Exercism mentors
        contributors:
          title: Open source contributors
          description:
            Exercism could not be the success it is without the contributors of
            over 2,000 volunteers, who add value in numerous ways, from writing
            tooling to creating the exercises you solve.
          link_text: See all contributors
ru:
  about:
    partners:
      packt:
        see_all_supporters: Посмотреть всех наших спонсоров
        supported_by_prefix: Exercism поддерживают
        org_supports_exercism: "%{org_name} поддерживает Exercism"
        packt_partnership_description:
          Packt Publishing ключевой партнёр Exercism,
          помогающий нам развивать как сбор средств, так и контентную сторону
          платформы. Они спонсировали нашу новую роль по сбору средств, и сейчас
          мы развиваем более глубокое партнёрство, которое запустим в
          начале 2022 года.
        about_packt_publishing: О Packt Publishing
        packt_about_p1:
          Packt технический издатель, сосредоточенный на практическом применении
          технологий. Авторы Packt в основном действующие разработчики, которые
          разбираются в том, что действительно работает и как добиться результата с
          бесконечным потоком новых технологий. Читатели и пользователи Packt занятые
          инженеры, создающие решения и приложения, которые хотят
          знать, как технология работает на практике и стоит
          ли её использовать.
        packt_about_p2:
          Packt поддерживает Exercism в его миссии облегчить путь к
          свободному владению языками. Мы разделяем ценности Exercism, независимость
          от какой-либо одной платформы или языка и веру в стремление
          инженеров поддерживать и помогать друг другу как сообщество равных. Книги и
          издания Packt призваны предоставить структурированный свод практических
          знаний, дополняющий такие замечательные платформы, как Exercism. Мы оба
          даём опытным профессионалам способ делиться знаниями и
          опытом с широким техническим сообществом.
    team:
      meta_title: Команда Exercism
      meta_description: "Узнайте, кто управляет Exercism: наши попечители, руководство и штатные сотрудники."
      our_team: Наша команда
      built_by_people_worldwide: Exercism создают люди со всего мира 🙌
      stats:
        contributors: Более %{count} контрибьюторов
        countries: "%{count} стран"
        github_repos: "%{count} репозиториев GitHub"
      map_alt_text: Карта мира с аватарами контрибьюторов Exercism
      info_box:
        title: Тысячи людей поддержали наше видение и помогли создать Exercism.
        description:
          Exercism опирается на команду руководителей и сотрудников, более широкую команду из
          примерно ста мейнтейнеров и ключевых контрибьюторов, а также небольшой
          вклад тысяч отдельных людей. Помимо этого
          вклада в наш продукт, десятки тысяч участников нашего
          сообщества внесли свой вклад, давая обратную связь и помогая другим.
      leadership_team:
        title: Команда руководителей
        description:
          Наша команда руководителей управляет стратегической и организационной сторонами
          Exercism. Они отвечают за выполнение нашей миссии
          и сохранение наших ценностей.
        katrina_owen:
          image_alt: Изображение Катрины
          handle: Сооснователь и директор
          bio_html: >-
            Катрина изначальный создатель Exercism. Она соавтор
            %{book_link}. Разработчик-полиглот и обладательница награды Ruby Hero, со
            степенью в области молекулярной биологии. Глубоко заботится об открытом исходном коде и
            вносит вклад в несколько проектов за пределами Exercism.
          book_link_text: 99 Bottles of OOP
          personal_site_link: Личный сайт Катрины
        jeremy_walker:
          image_alt: Изображение Джереми Уокера
          handle: Сооснователь и CEO
          bio_html: >-
            Джереми предприниматель и разработчик программного обеспечения, увлечённый
            равенством и возможностями. Он стал сооснователем различных организаций,
            включая Meducation, Wondr Medical и %{kaido_link}, а также владеет
            патентом на ИИ, применяемый в кардиохирургии.
          personal_site_link: Личный сайт Джереми
      staff_team:
        title: Сотрудники
        description:
          Наши сотрудники управляют нашим сайтом, CLI и операционной стороной
          Exercism, обеспечивая безопасный и надёжный опыт для
          всех, кто пользуется Exercism.
        erik_schierboom:
          image_alt: Изображение Эрика Ширбоома
          handle: Руководитель направления открытого исходного кода
          bio_html: >-
            Эрик разработчик-полиглот, который любит изучать новые языки. Он создаёт
            программное обеспечение и инфраструктуру, обеспечивающую работу элементов платформы
            с открытым исходным кодом, следя за тем, чтобы работа с каждым треком приносила радость. До
            перехода на полную занятость он был одним из лучших волонтёров Exercism.
          personal_site_link: Личный сайт Эрика
        aron_demeter:
          image_alt: Изображение Арона Деметера
          handle: Фронтенд-разработчик
          bio_html: >-
            Арон разработчик-самоучка, которого воодушевляет обнаружение
            взаимосвязей между вещами. У него степень магистра в области классического
            фортепианного исполнительства. В свободное время он любит проводить время со своей
            семьёй, изучать новые языки на Exercism или слушать оперу.
      alumni_team:
        title: Выпускники
        description:
          Люди, которые ранее работали в Exercism на полную занятость и с тех пор
          перешли к новым приключениям. Мы с благодарностью помним об их наследии!
        nicole_chalmers:
          image_alt: Изображение Николь Чалмерс
          bio_html: >-
            Николь руководитель направления продукта в %{kaido_link}. Она провела два года как руководитель
            направления продукта в Exercism, ведя нас от v1 к v2 и помогая заложить
            принципы и идеи, которые до сих пор движут Exercism.
        charles_care:
          image_alt: Изображение Чарльза Кэра
          bio:
            Чарльз был частью команды, создавшей Exercism v2, работая непосредственно
            над серверным кодом и инфраструктурой. Он помог создать
            первую версию нашей платформы автоматизированного менторства и
            интеграцию с Github.
        karlo_soriano:
          image_alt: Изображение Карло Сориано
          bio:
            Карло работал над частью Exercism, связанной с сайтом. Он создал большую часть
            интерактивного фронтенда сайта для v3 и внёс вклад в значительную часть
            бэкенд-платформы на Rails.
        taiyab_raja:
          image_alt: Изображение Тайяба Раджи
          bio:
            Тайяб дизайнер, стоящий за прекрасной графикой и UX Exercism v3. Ему
            нравится всё, что связано со стартапами, дизайном и предпринимательством.
        loretta_murray:
          image_alt: Изображение Лоретты Мюррей
          bio:
            Лоретта была руководителем направления сбора средств Exercism в 2022-2023 годах. Её
            мотивирует преобразующая сила сбора средств, и она
            дипломированный бизнес-коуч, увлечённый развитием
            навыков специалистов по сбору средств.
        jonathan_middleton:
          image_alt: Изображение Джонатана Миддлтона
          bio:
            Джонатан был менеджером сообщества Exercism в 2022-2023 годах. Он любит
            общаться с людьми и слушать истории о том, как люди оказались там,
            где они сейчас в жизни. Он любознателен и постепенно
            осваивает программирование.
      community_teams:
        maintainers:
          title: Мейнтейнеры треков
          description:
            Наши мейнтейнеры это опора языковых треков и
            упражнений на Exercism. Они создают и организуют упражнения для каждого
            из наших %{num_lang} языков и помогают направлять нас, чтобы Exercism обучал
            студентов максимально идиоматичным образом.
          link_text: Посмотреть всех мейнтейнеров Exercism
        mentors:
          title: Менторы
          description:
            Наши менторы это человеческий элемент за Exercism, дающий
            чуткую обратную связь по решениям учащихся. Они та магия, которая
            оживляет Exercism.
          link_text: Посмотреть всех менторов Exercism
        contributors:
          title: Контрибьюторы открытого исходного кода
          description:
            Exercism не был бы таким успешным без вклада
            более 2000 волонтёров, которые приносят пользу множеством способов, от написания
            инструментов до создания упражнений, которые вы решаете.
          link_text: Посмотреть всех контрибьюторов
