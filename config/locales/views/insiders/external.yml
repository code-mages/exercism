en:
  insiders:
    external:
      insiders_title: Exercism Insiders
      hero_subtitle_html: <strong>Donate to Exercism</strong> and get <span
        class="underline">bonus features</span> and <span
        class="underline">behind-the-scenes content.</span>
      donations_message_html: We rely on donations from <strong>people like
        you</strong> to survive &amp; grow! Insiders is our way of thanking you
        for supporting us!
      features_summary_html:
        Get behind-the-scenes access, <strong>Dark Mode,</strong>
        exclusive badges, <strong>advanced GitHub Sync and Favorites,</strong>
        ChatGPT integration, <strong>extra mentoring slots,</strong> private
        Discord channel, <strong>an ad-free experience,</strong> and more when
        you donate to Exercism 🎉
      non_profit_info: "Exercism is an independent, registered not-for-profit
        organisation (UK #11733062) with a tiny team. All donations are used to
        run and improve the platform."
      benefits_heading: Insider Benefits
      benefits_tagline: Here are some of the ways we say thank you for supporting us.
      exclusive_content_heading: Exclusive Insiders Content
      exclusive_content_tagline:
        Join Insiders to get behind-the-scenes content as we
        grow and evolve Exercism.
      support_exercism_heading: Help Support Exercism
      donations_needed_html:
        We need <span class="font-medium text-white">%{amount} in
        donations</span> each month to become sustainable.
      join_insiders_call_to_action: Please help us get there by joining Insiders!
      monthly_donations: "Monthly donations: %{amount}"
      sustainable_goal: Sustainable at %{amount}
      faqs_heading: The Nitty Gritty & FAQs
      faq_access:
        question: Is the only way to access Insiders through donating?
        answer_part1_html:
          The most common way to access insiders is through a regular
          donation. Regular contributors get Insiders access for free, and it's
          also possible to get Lifetime Insiders membership for significant
          donations or contributions. You can check the exact algorithm <a
          href="%{codebase_link}">in our codebase</a> but it's also reproduced
          here.
        lifetime_access_intro: "To gain lifetime access you need one of the following:"
        lifetime_criterion_founder: To be a founder or staff member
        lifetime_criterion_supermentor:
          To be a supermentor (100+ solutions mentored on
          a track with a 95% positive rating)
        lifetime_criterion_reputation: To have a reputation equal or greater than 1,000
        lifetime_criterion_donation: To have donated $499 (in one chunk or many parts)
        temporary_access_intro:
          "For those without lifetime access, to gain access you
          need one of the following:"
        temporary_criterion_monthly_donation: To have a recurring monthly donation of $10 or more.
        temporary_criterion_maintainer: To be a maintainer
        temporary_criterion_recent_reputation:
          To have earned 30 reputation in the last
          30 days, or 200 reputation in the last 365 days (not including
          reputation for publishing solutions)
        temporary_criterion_legacy_donation:
          To have had a recurring donation at the
          point that Insiders launched (May 30th 2023), and it still to be
          active.
        temporary_criterion_one_off_donation:
          For donations before we launched Insiders,
          you get one month of Insiders for every $9.99 donated, from the date
          that Insiders launched, plus one extra bonus month. So if you donated
          $35 before Insiders launched, you'd get Insiders access through June,
          July, August and September 2023.
        support_html:
          If you think you meet these criteria but don't have access, please
          <a href="%{forum_issue_link}">open a forum issue</a> and someone will
          help you out! If you've donated via Paypal or GitHub Sponsors but
          don't have access, please see the next question.
      faq_paypal_github:
        question: I've donated via Paypal or GitHub Sponsors but don't have access.
        answer_html: Sometimes the tech breaks down and we don't get webhook
          notifications from GitHub or Paypal. If you have issues, please <a
          href="%{forum_issue_link}">open a forum issue</a> and someone will
          help you out!
      faq_cost:
        question: What does Insiders cost?
        answer:
          Insiders isn't a product that you can buy - it's our way of saying thank
          you for those who contribute, mentor or donate. The easiest way to get
          Insiders access is by setting up a regular monthly donation of $10 or
          more.
      faq_premium:
        question: Is Insiders the same as Premium?
        answer:
          Exercism Premium was discontinued in August 2023. All Premium members
          were migrated to have Exercism Insider status and their monthly
          payments converted to recurring donations.
      faq_reputation:
        question: How do I earn reputation?
        answer_html:
          Reputation is earned by mentoring or contributing to Exercism. You
          can also earn reputation by publishing your solutions, but that does
          not count towards Insiders access. You can check what actions result
          in what reputation by consulting <a href="%{docs_link}">our docs</a>.
          Check your <a href="%{journey_link}">journey page</a> to see where
          you're earning reputation.
ru:
  insiders:
    external:
      insiders_title: Exercism Insiders
      hero_subtitle_html: <strong>Поддержите Exercism пожертвованием</strong> и получите <span
        class="underline">бонусные возможности</span> и <span
        class="underline">эксклюзивный контент.</span>
      donations_message_html: Мы держимся на пожертвованиях от <strong>таких людей,
        как вы</strong>, чтобы выживать и расти! Insiders, это наш способ
        поблагодарить вас за поддержку!
      features_summary_html:
        Получите доступ к закулисному контенту, <strong>тёмной теме,</strong>
        эксклюзивным значкам, <strong>расширенной синхронизации с GitHub и избранному,</strong>
        интеграции с ChatGPT, <strong>дополнительным слотам менторинга,</strong> закрытому
        каналу в Discord, <strong>работе без рекламы</strong> и многому другому, когда
        вы делаете пожертвование Exercism 🎉
      non_profit_info: "Exercism, это независимая зарегистрированная некоммерческая
        организация (Великобритания #11733062) с крошечной командой. Все пожертвования идут на
        поддержку и улучшение платформы."
      benefits_heading: Преимущества для Insiders
      benefits_tagline: Вот некоторые из способов, которыми мы благодарим вас за поддержку.
      exclusive_content_heading: Эксклюзивный контент для Insiders
      exclusive_content_tagline:
        Присоединяйтесь к Insiders, чтобы получать закулисный контент по мере того,
        как мы развиваем и совершенствуем Exercism.
      support_exercism_heading: Помогите поддержать Exercism
      donations_needed_html:
        Нам нужно <span class="font-medium text-white">%{amount}
        пожертвований</span> каждый месяц, чтобы стать самоокупаемыми.
      join_insiders_call_to_action: Пожалуйста, помогите нам достичь этой цели, присоединившись к Insiders!
      monthly_donations: "Ежемесячные пожертвования: %{amount}"
      sustainable_goal: Самоокупаемость при %{amount}
      faqs_heading: Подробности и частые вопросы
      faq_access:
        question: Единственный ли способ получить доступ к Insiders, это пожертвование?
        answer_part1_html:
          Самый распространённый способ получить доступ к Insiders, это регулярное
          пожертвование. Постоянные жертвователи получают доступ к Insiders бесплатно, а
          также можно получить пожизненное членство Insiders за значительные
          пожертвования или вклад. Вы можете посмотреть точный алгоритм <a
          href="%{codebase_link}">в нашей кодовой базе</a>, но он также приведён
          здесь.
        lifetime_access_intro: "Чтобы получить пожизненный доступ, вам нужно одно из следующего:"
        lifetime_criterion_founder: Быть основателем или сотрудником
        lifetime_criterion_supermentor:
          Быть суперментором (100+ решений, наставленных на
          треке, с рейтингом положительных отзывов 95%)
        lifetime_criterion_reputation: Иметь репутацию, равную или превышающую 1 000
        lifetime_criterion_donation: Пожертвовать $499 (одним платежом или частями)
        temporary_access_intro:
          "Для тех, у кого нет пожизненного доступа, чтобы получить доступ,
          нужно одно из следующего:"
        temporary_criterion_monthly_donation: Иметь регулярное ежемесячное пожертвование в $10 или больше.
        temporary_criterion_maintainer: Быть мейнтейнером
        temporary_criterion_recent_reputation:
          Заработать 30 репутации за последние
          30 дней или 200 репутации за последние 365 дней (не считая
          репутации за публикацию решений)
        temporary_criterion_legacy_donation:
          Иметь регулярное пожертвование на
          момент запуска Insiders (30 мая 2023 года), которое всё ещё
          активно.
        temporary_criterion_one_off_donation:
          За пожертвования, сделанные до запуска Insiders,
          вы получаете один месяц Insiders за каждые пожертвованные $9.99, начиная с даты
          запуска Insiders, плюс один дополнительный бонусный месяц. Так, если вы пожертвовали
          $35 до запуска Insiders, вы получите доступ к Insiders на июнь,
          июль, август и сентябрь 2023 года.
        support_html:
          Если вы считаете, что соответствуете этим критериям, но не имеете доступа, пожалуйста,
          <a href="%{forum_issue_link}">создайте тему на форуме</a>, и кто-нибудь
          вам поможет! Если вы жертвовали через Paypal или GitHub Sponsors, но
          не имеете доступа, пожалуйста, смотрите следующий вопрос.
      faq_paypal_github:
        question: Я жертвовал через Paypal или GitHub Sponsors, но не имею доступа.
        answer_html: Иногда техника даёт сбой, и мы не получаем webhook-уведомления
          от GitHub или Paypal. Если у вас возникли проблемы, пожалуйста, <a
          href="%{forum_issue_link}">создайте тему на форуме</a>, и кто-нибудь
          вам поможет!
      faq_cost:
        question: Сколько стоит Insiders?
        answer:
          Insiders, это не продукт, который можно купить, это наш способ сказать спасибо
          тем, кто вносит вклад, менторит или жертвует. Проще всего получить
          доступ к Insiders, оформив регулярное ежемесячное пожертвование в $10 или
          больше.
      faq_premium:
        question: Insiders, это то же самое, что Premium?
        answer:
          Exercism Premium был прекращён в августе 2023 года. Все участники Premium
          были переведены на статус Exercism Insider, а их ежемесячные
          платежи преобразованы в регулярные пожертвования.
      faq_reputation:
        question: Как мне заработать репутацию?
        answer_html:
          Репутация зарабатывается менторством или вкладом в Exercism. Вы
          также можете заработать репутацию, публикуя свои решения, но это не
          засчитывается для доступа к Insiders. Вы можете посмотреть, какие действия дают
          какую репутацию, в <a href="%{docs_link}">нашей документации</a>.
          Проверьте свою <a href="%{journey_link}">страницу пути</a>, чтобы увидеть, где
          вы зарабатываете репутацию.
