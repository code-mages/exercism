en:
  insiders:
    show:
      insiders_title: Exercism Insiders
      thank_you_message: Thanks for making Exercism the success it is.
      support_message:
        Exercism exists because people like you come together to build,
        fund and support it. Thank you so much!
      feature_and_video_info_html: >
        Below you'll find information about the different features you can now
        access through Insiders, along with behind the scenes videos. If you
        have ideas for extra features or extra behind-the-scenes content, please
        post on our #insiders channel on Discord, or open a thread on the forum.
      latest_video_prompt: Why not start with the latest behind the scenes Insiders video 👉
      behind_the_scenes_videos_heading: Behind-the-scenes videos
      your_insider_benefits_heading: Your Insider Benefits
      exclusive_content:
        title: Exclusive content
        description:
          Keep up to date with what we're planning and building with private
          Insiders livestreams, vlogs, and technical deep dives. Check out the
          videos above. We'll email you when there's a new one.
      private_discord_channel:
        title: Private Discord channel
        description_html: You should now have access to an exclusive <a
          href="%{insiders_channel_link}">#insiders channel on Discord</a> where
          you can hang out with me and other staff and Insiders. Check the <a
          href="%{integrations_page_link}">integrations page</a> if you don't
          see it.
      contribute_on_community_calls:
        title: Contribute on community calls
        description_html:
          Our community calls are watchable by anyone, but only Insiders
          join in the conversation. Jump on stage and make your voice heard.
          Check Events on <a href="%{discord_events_link}">Discord</a> for the
          next call.
      dark_theme:
        title: Dark theme
        description_html:
          We've put together a lovely Dark Theme for you to enjoy. Give
          your eyes a break while coding at night and enjoy Exercism in its
          darkest glory. You can toggle your theme in your <a
          href="%{user_preferences_link}">User Preferences</a>.
      chatgpt:
        title: ChatGPT
        description:
          Our ChatGPT integration will help you get unstuck directly in our
          online editor. You get 3x v4.0 requests and 30x v3.5 requests per
          calendar month. Let us know how you get on!
      name_tag_flair_and_badges:
        title: Name tag flair & Badges
        description_html:
          You'll now see a shiny little %{icon} next to your name around
          the site and a new tag on <a href="%{profile_link}">your public
          profile</a>. At some point soon, we'll be letting you customise which
          icon you'd like!
        icon_alt_text: purple heart icon signifying Insiders
      extra_mentoring_slots:
        title: Extra Mentoring Slots
        description:
          You now have the maximum amount of simultaneous mentoring slots
          available per track. Check half way down a track page to check your
          active sessions.
      exclusive_badges:
        title: Exclusive Badges
        description_html:
          You should also have a new very exclusive badge (or two!).
          Check your <a href="%{my_journey_link}">My Journey</a> badges to
          reveal them. There are also new extra hidden badges for you to unlock
          as you solve exercises.
      exclusive_perks:
        title: Exclusive Perks
        description:
          In the next few weeks, we'll be revealing exclusive Perks from our
          partners. As an Insider, you'll get exclusive bonuses offers and
          discounts.
ru:
  insiders:
    show:
      insiders_title: Exercism Insiders
      thank_you_message: Спасибо, что делаете Exercism таким успешным.
      support_message:
        Exercism существует, потому что такие люди, как вы, объединяются, чтобы
        создавать, финансировать и поддерживать его. Огромное вам спасибо!
      feature_and_video_info_html: >
        Ниже вы найдёте информацию о разных возможностях, к которым теперь есть
        доступ через Insiders, а также видео о том, что происходит за кулисами.
        Если у вас есть идеи для дополнительных возможностей или закулисного
        контента, напишите в нашем канале #insiders в Discord или создайте тему
        на форуме.
      latest_video_prompt: Почему бы не начать с последнего закулисного видео Insiders 👉
      behind_the_scenes_videos_heading: Закулисные видео
      your_insider_benefits_heading: Ваши преимущества Insider
      exclusive_content:
        title: Эксклюзивный контент
        description:
          Будьте в курсе того, что мы планируем и создаём, благодаря приватным
          трансляциям Insiders, влогам и техническим разборам. Посмотрите видео
          выше. Мы напишем вам на почту, когда появится новое.
      private_discord_channel:
        title: Приватный канал Discord
        description_html: >-
          Теперь у вас должен быть доступ к эксклюзивному <a
          href="%{insiders_channel_link}">каналу #insiders в Discord</a>, где
          вы можете общаться со мной, другими сотрудниками и участниками
          Insiders. Загляните на <a
          href="%{integrations_page_link}">страницу интеграций</a>, если не
          видите его.
      contribute_on_community_calls:
        title: Участвуйте в общественных созвонах
        description_html:
          Наши общественные созвоны может смотреть кто угодно, но только
          участники Insiders присоединяются к беседе. Выходите на сцену и
          заявите о себе. Проверьте раздел Events в <a
          href="%{discord_events_link}">Discord</a>, чтобы узнать о следующем
          созвоне.
      dark_theme:
        title: Тёмная тема
        description_html:
          Мы подготовили для вас чудесную тёмную тему. Дайте глазам отдохнуть
          во время ночного кодинга и наслаждайтесь Exercism во всей его тёмной
          красе. Переключить тему можно в ваших <a
          href="%{user_preferences_link}">Настройках пользователя</a>.
      chatgpt:
        title: ChatGPT
        description:
          Наша интеграция с ChatGPT поможет вам справиться со сложностями прямо
          в нашем онлайн-редакторе. Вы получаете 3 запроса к v4.0 и 30 запросов
          к v3.5 в календарный месяц. Расскажите нам, как у вас дела!
      name_tag_flair_and_badges:
        title: Отметка у имени и значки
        description_html:
          Теперь рядом с вашим именем по всему сайту вы будете видеть блестящий
          %{icon}, а на <a href="%{profile_link}">вашем публичном профиле</a>
          появится новая отметка. Совсем скоро мы дадим вам возможность выбирать,
          какой значок вам нравится!
        icon_alt_text: значок в виде фиолетового сердца, обозначающий Insiders
      extra_mentoring_slots:
        title: Дополнительные слоты для наставничества
        description:
          Теперь у вас доступно максимальное количество одновременных слотов
          для наставничества на каждом треке. Загляните примерно в середину
          страницы трека, чтобы проверить свои активные сессии.
      exclusive_badges:
        title: Эксклюзивные значки
        description_html:
          У вас также должен появиться новый очень эксклюзивный значок (или
          даже два!). Загляните в значки раздела <a
          href="%{my_journey_link}">Мой путь</a>, чтобы открыть их. Ещё есть
          новые скрытые значки, которые можно разблокировать, решая упражнения.
      exclusive_perks:
        title: Эксклюзивные бонусы
        description:
          В ближайшие недели мы будем раскрывать эксклюзивные бонусы от наших
          партнёров. Как участник Insider, вы получите эксклюзивные бонусные
          предложения и скидки.
