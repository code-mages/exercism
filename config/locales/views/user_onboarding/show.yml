en:
  user_onboarding:
    show:
      header:
        title: Just before you get started… 📝
        subtitle_html:
          We're so excited you're here and hope that Exercism will be a
          valuable and fun experience for you. <strong>We need to get a couple
          of quick legal bits out of the way to ensure you get the experience
          you expect, and to protect our community.</strong>
      terms_section:
        title: Our Terms of Service
        summary: "In summary, our Terms of Service say that:"
        code_of_conduct_html:
          You must act in a way that is in line with Exercism's
          values of respect and empathy per our %{code_of_conduct_link}. If you
          do not, we have the right to block your usage of the platform.
        property_license: Anything you submit to the site (e.g. your solutions,
          feedback, etc) remains your property, but you grant Exercism a licence
          to use it as we wish in perpetuity.
        licences_html:
          You may use exercises (provided by Exercism) and solutions
          (created by users) in accordance with the %{mit_license_link} and
          %{cc_sa_4_license_link} licences respectively.
        full_terms_html: You can read our full %{terms_of_service_link}.
        accept_terms: I accept Exercism's Terms of Service
      privacy_policy_section:
        title: Privacy Policy
        summary_html:
          Our Privacy Policy is nice and simple. It says that <strong>we
          will never share your details with anyone outside of
          Exercism,</strong> and that we don't use third-party cookies, so
          no-one will track you here. You can %{privacy_policy_link}.
        accept_privacy_policy: I accept Exercism's Privacy Policy
      save_button: Save & Get Started
ru:
  user_onboarding:
    show:
      header:
        title: Ещё немного перед началом… 📝
        subtitle_html:
          Мы очень рады, что вы здесь, и надеемся, что Exercism станет для вас
          полезным и увлекательным опытом. <strong>Нам нужно быстро уладить пару
          юридических формальностей, чтобы вы получили именно то, чего ожидаете,
          и чтобы защитить наше сообщество.</strong>
      terms_section:
        title: Наши Условия использования
        summary: "Если коротко, наши Условия использования гласят, что:"
        code_of_conduct_html:
          Вы должны вести себя в соответствии с ценностями Exercism, уважением
          и эмпатией, согласно нашему %{code_of_conduct_link}. В противном случае
          мы вправе заблокировать вам доступ к платформе.
        property_license: Всё, что вы отправляете на сайт (например, ваши решения,
          отзывы и так далее), остаётся вашей собственностью, но вы предоставляете
          Exercism бессрочную лицензию на использование этого по нашему усмотрению.
        licences_html:
          Вы можете использовать упражнения (предоставленные Exercism) и решения
          (созданные пользователями) в соответствии с лицензиями %{mit_license_link}
          и %{cc_sa_4_license_link} соответственно.
        full_terms_html: Вы можете прочитать наши полные %{terms_of_service_link}.
        accept_terms: Я принимаю Условия использования Exercism
      privacy_policy_section:
        title: Политика конфиденциальности
        summary_html:
          Наша Политика конфиденциальности проста и понятна. Она гласит, что
          <strong>мы никогда не передадим ваши данные никому за пределами
          Exercism,</strong> и что мы не используем сторонние cookie, поэтому
          никто не будет следить за вами здесь. Вы можете %{privacy_policy_link}.
        accept_privacy_policy: Я принимаю Политику конфиденциальности Exercism
      save_button: Сохранить и начать
