ru:
  cohorts:
    show:
      closed_for_applications: Этот поток уже стартовал, и набор в него закрыт.
      gohort_aug_22:
        intro_cohort: Представляем %{cohort_name}
        gohort_intro:
          Что происходит, когда несколько увлечённых учеников поддерживают и
          помогают друг другу в обучении? Мы придумали Gohort, чтобы это
          выяснить! («Go cohort», уловили игру слов? 😉)
        tell_me_more: Расскажите подробнее!
        what_is_gohort: Что такое Gohort?
        gohort_description:
          Gohort устроен просто. Мы дадим вам и группе других учеников
          пространство для совместного обучения, добавим лучших наставников и
          экспертов Exercism и будем поддерживать вас, пока вы вместе проходите
          учебную программу Exercism по Go за 30 дней.
        free_access: 100% бесплатно
        start_date: Старт 8 августа. Длится 30 дней.
        own_time: Проходите трек в удобном для вас темпе
        pair_or_individual: Объединяйтесь в пары или работайте индивидуально
        commit_sharing: Возьмите на себя обязательство делиться своим путём и поддерживать других
        notes_programming_experience:
          'Примечание: требуется некоторый опыт программирования
          (если вы можете написать «Hello World» на любом языке, этого
          достаточно).'
        sign_up_below: Записывайтесь ниже!
        gain_fluency: Свободно освойте Go
        taste_of_what_youll_learn: Вот небольшой пример того, чему вы научитесь!
        track_description:
          На треке Go в Exercism есть %{num_concepts} концепций для
          изучения, а также %{num_exercises} упражнений по программированию,
          которые вам предстоит выполнить. Это отличный способ освоить
          специфичные для Go концепции и подходы к работе.
        mentoring_benefit:
          А ещё лучше, получите наставничество от опытных Go-разработчиков,
          чтобы обнаружить пробелы в своих знаниях и глубоко понять язык.
        explore_track: Изучить трек Go
      form:
        get_registered: Зарегистрируйтесь!
        sign_up_to_cohort: Запишитесь на %{cohort_name}
        login_or_signup_message:
          Чтобы зарегистрироваться на %{cohort_name}, пожалуйста, войдите или
          зарегистрируйтесь на Exercism, а затем вернитесь на эту страницу.
        signup_button: Зарегистрироваться бесплатно
        login_button: Войти
        you_are_all_set: Всё готово!
        enrolled_message:
          Поздравляем, всё готово! Кто-то из нашей команды вскоре напишет вам
          на почту, чтобы поприветствовать в %{cohort_name} и рассказать, как
          всё настроить!
        you_are_on_waiting_list: Вы в списке ожидания
        waiting_list_message:
          Извините, %{cohort_name} заполнился до того, как вы сюда добрались!
          Сейчас вы на %{position} месте в списке ожидания. Если появится
          свободное место, мы сообщим вам. Иначе мы напишем вам о следующем
          %{cohort_name} позже в этом году.
        registration_easy:
