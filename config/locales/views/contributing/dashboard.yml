en:
  contributing:
    dashboard:
      show:
        methods_section:
          header:
            title: How you can help us build Exercism
          method:
            proofread_and_update:
              title: Proofread and update
              tag: Beginner
              description:
                Never contributed to an open source project? Give this a go. We'll
                help you submit your first pull request.
            improve_content:
              title: Improve a concept or exercise
              tag: Intermediary
              description:
                Fix bugs and make improvements to concepts and exercise across
                Exercism. Help students have a smooth and error-free experience.
            create_new_content:
              title: Create a new exercise or concept
              tag: Advanced
              description:
                Build out a new exercise or concept based on a track's roadmap.
                Have fun making interactive content that millions of people will
                use.
            develop_test_runner:
              title: Develop a test runner
              tag: Project
              description:
                Test runners power our online editor. All tracks have basic test
                runners, but many need more advanced features and functionality
                adding.
            develop_analyzer:
              title: Develop an analyzer
              tag: Project
              description:
                Analyzers give automated feedback to students through ASTs
                analysis. These are complex and deeply interesting pieces of
                software to develop.
            develop_representer:
              title: Develop a representer
              tag: Project
              description:
                Representers help us spot identical solutions so that we can reuse
                feedback. Simpler than analyzers but fun and interesting to
                reason about.
      tasks_section:
        issues_needed_help:
          one: "1 issue needs help"
          other: "%{count} issues need help"
        tracks_list:
          more_tracks: "+ %{count} more"
          needs_help: "need help"
        explore_issues:
          one: "Explore 1 issue"
          other: "Explore %{count} issues"
ru:
  contributing:
    dashboard:
      show:
        methods_section:
          header:
            title: Как вы можете помочь нам развивать Exercism
          method:
            proofread_and_update:
              title: Проверить и обновить
              tag: Начинающий
              description:
                Никогда не участвовали в open source проектах? Попробуйте. Мы
                поможем вам отправить ваш первый pull request.
            improve_content:
              title: Улучшить концепцию или упражнение
              tag: Средний уровень
              description:
                Исправляйте ошибки и улучшайте концепции и упражнения по всему
                Exercism. Помогите ученикам получить гладкий и безошибочный опыт.
            create_new_content:
              title: Создать новое упражнение или концепцию
              tag: Продвинутый
              description:
                Разработайте новое упражнение или концепцию на основе дорожной
                карты трека. Получайте удовольствие, создавая интерактивный
                контент, которым будут пользоваться миллионы людей.
            develop_test_runner:
              title: Разработать test runner
              tag: Проект
              description:
                Test runner'ы обеспечивают работу нашего онлайн-редактора. У всех
                треков есть базовые test runner'ы, но многим нужны более
                продвинутые возможности и функциональность.
            develop_analyzer:
              title: Разработать анализатор
              tag: Проект
              description:
                Анализаторы дают ученикам автоматическую обратную связь через
                анализ AST. Это сложное и по-настоящему интересное программное
                обеспечение для разработки.
            develop_representer:
              title: Разработать representer
              tag: Проект
              description:
                Representer'ы помогают нам находить идентичные решения, чтобы мы
                могли переиспользовать обратную связь. Проще анализаторов, но
                увлекательны и интересны для размышлений.
      tasks_section:
        issues_needed_help:
          one: "1 задаче нужна помощь"
          few: "%{count} задачам нужна помощь"
          many: "%{count} задачам нужна помощь"
          other: "%{count} задачам нужна помощь"
        tracks_list:
          more_tracks: "+ ещё %{count}"
          needs_help: "нужна помощь"
        explore_issues:
          one: "Изучить 1 задачу"
          few: "Изучить %{count} задачи"
          many: "Изучить %{count} задач"
          other: "Изучить %{count} задач"
