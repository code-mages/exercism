en:
  challenges:
    mechanical_march:
      month_of: Month 4 of #12in23
      title: It's Mechanical March! ✨
      intro: This month for #12in23 we're exploring system languages - those that compile to machine code. We've got interviews with core language and community members (from Go, Rust and hopefully more!), lots of live streaming, exclusive swag and more.
      overview_video_heading: Start by watching our Mechanical March overview video  👉
      overview_video_body: Our introductory video gives a quick overview to the month, explores what we mean by systems languages, looks at where they're useful, and finally gives a quick comparison between the featured languages this month.
      overview_video_cta: Take a watch and leave a comment!
      learn_and_earn_heading: Learn and Earn (the badge)!
      learn_and_earn_body: >-
        Earn the Mechanical March badge for completing and publishing 5 exercises in one of the following languages.
        Consider starting with a language with a syllabus (
      learn_and_earn_body_after: ).
      recommended_intro: 'You can solve any exercises in these tracks to get the badge, but we recommend the following as interesting challenges to approach in systems languages:'
      exercise_linked_list_name: 'Linked List*:'
      exercise_linked_list_desc: Practice allocating/freeing memory, and pointers
      exercise_secret_handshake_name: 'Secret Handshake:'
      exercise_secret_handshake_desc: Explore bitwise operators
      exercise_pangram_name: 'Pangram:'
      exercise_pangram_desc: Explore for loops, strings and characters
      exercise_sieve_name: 'Sieve:'
      exercise_sieve_desc: Practice arrays and for loops
      exercise_binary_search_name: 'Binary Search:'
      exercise_binary_search_desc: A classic exercise for loops.
      simple_linked_list_note: '* Some tracks have implemented "Simple Linked List" instead, which is also great to try.'
      learn_from_others_heading: Learn from others… 🎥
      learn_from_others_body: Throughout the month we'll have interviews - including Josh Triplett, the co-lead of Rust, and Jonny Boursiquot, a key member of the Go community - walkthroughs from Exercism track contributors, and live streams of the community solving exercises. We're hoping to give some regular streamers official residencies this month too!
      subscribe_to_our: Subscribe to our
      twitch_channel: Twitch Channel
      and: and
      youtube_channel: YouTube Channel
      to_not_miss_out: to not miss out!
      schedule_top_right: There is a schedule at the top right of this page.
      join_conversation_heading: Join the conversation… 💬
      help_compile_before: Help us compile the
      definitive_list: definitive list of great resources
      help_compile_after: for learning and mastering systems programming in our dedicated forum thread.
      join_using_before: Join in the conversation by using the
      forum_tag: '#12in23 tag on our forums'
      join_using_middle: or the
      join_using_after: hashtag around social media!
      swag_note: We have exclusive Mechanical March swag that will only be available later in the month. Keep an eye on the swag store for details (and check our the Functional February swag before it goes too!)
      streaming_schedule_heading: Upcoming Streaming Schedule
      streaming_schedule_body: This schedule is regularly updated. All events will stream on our
      streaming_schedule_subscribe: '- subscribe so not to miss out!'
      all_times_utc: All times in UTC.
      how_does_it_work_heading: How does #12in23 work?
      how_does_it_work_body: Each month has a different theme and featured languages. Solve exercises in a featured language during that month. Check out our two introductory videos for more details!
      video_thumbnail_alt: A video thumbnail
      video_hows_it_going: How's your #12in23 going?
      video_official_calendar: The Official #12in23 Calendar
      track_progress_note: Track your progress at the bottom of the page.
      donate_heading: Enjoying #12in23? Please donate 🙏
      donate_body: We keep Exercism free so that anyone can use it. But we rely on the generosity of people that could afford it to make that possible. If you're enjoying #12in23 and are financially able, please consider donating to keep Exercism going!
      donate_now: Donate now
      year_long_badge_heading: The year-long #12in23 badge
      year_long_badge_body: >-
        At the end of the year we'll be awarding an exclusive badge to anyone who completes all the featured exercises in the correct paradigms. You can complete the exercise any time during 2023.
        Each valid exercise will be shown below.
        Find the full list of rules and exercises in
      year_long_badge_forum_post_html: <a href="%{href}">this forum post</a>.
      published_exercises: Published Exercises
      published_exercises_count: (%{count} / 10 so far)
      no_valid_exercises: No valid exercises found.
      progress_heading: Your #12in23 Progress
      progress_body: Below you'll see a list of all the languages you've used during 2023. Aim to complete 12 languages by the end of the year!
      progress_cta: Submit 5 exercises (not including "Hello World") in a track to tick off that language!
      completed: Completed
      exercises_completed: '%{count} exercises completed'
      exercises_completed_of_5: '%{count} / 5 exercises completed'
ru:
  challenges:
    mechanical_march:
      month_of: Месяц 4 из #12in23
      title: Настал Механический март! ✨
      intro: В этом месяце в рамках #12in23 мы изучаем системные языки, те, что компилируются в машинный код. Нас ждут интервью с ключевыми разработчиками языков и участниками сообщества (из Go, Rust и, надеемся, не только!), много прямых трансляций, эксклюзивный мерч и многое другое.
      overview_video_heading: Начните с просмотра обзорного видео о Механическом марте  👉
      overview_video_body: Наше вводное видео дает краткий обзор месяца, объясняет, что мы понимаем под системными языками, показывает, где они полезны, и в конце кратко сравнивает языки этого месяца.
      overview_video_cta: Посмотрите и оставьте комментарий!
      learn_and_earn_heading: Учитесь и зарабатывайте (значок)!
      learn_and_earn_body: >-
        Получите значок Механического марта, выполнив и опубликовав 5 упражнений на одном из следующих языков.
        Стоит начать с языка, у которого есть учебный план (
      learn_and_earn_body_after: ).
      recommended_intro: 'Чтобы получить значок, можно решать любые упражнения в этих треках, но мы рекомендуем следующие как интересные задачи для системных языков:'
      exercise_linked_list_name: 'Linked List*:'
      exercise_linked_list_desc: Попрактикуйтесь в выделении и освобождении памяти, а также в указателях
      exercise_secret_handshake_name: 'Secret Handshake:'
      exercise_secret_handshake_desc: Изучите побитовые операторы
      exercise_pangram_name: 'Pangram:'
      exercise_pangram_desc: Изучите циклы for, строки и символы
      exercise_sieve_name: 'Sieve:'
      exercise_sieve_desc: Попрактикуйтесь с массивами и циклами for
      exercise_binary_search_name: 'Binary Search:'
      exercise_binary_search_desc: Классическое упражнение с циклами for.
      simple_linked_list_note: '* В некоторых треках вместо этого реализовано "Simple Linked List", его тоже стоит попробовать.'
      learn_from_others_heading: Учитесь у других… 🎥
      learn_from_others_body: В течение месяца у нас будут интервью, в том числе с Джошем Триплеттом, соруководителем Rust, и Джонни Бурсику, ключевым участником сообщества Go, разборы от контрибьюторов треков Exercism и прямые трансляции решения упражнений сообществом. Мы надеемся дать некоторым постоянным стримерам официальные резиденции в этом месяце!
      subscribe_to_our: Подпишитесь на наш
      twitch_channel: канал на Twitch
      and: и
      youtube_channel: канал на YouTube
      to_not_miss_out: чтобы ничего не пропустить!
      schedule_top_right: Расписание находится в правом верхнем углу этой страницы.
      join_conversation_heading: Присоединяйтесь к обсуждению… 💬
      help_compile_before: Помогите нам составить
      definitive_list: полный список отличных ресурсов
      help_compile_after: для изучения и освоения системного программирования в нашей специальной теме на форуме.
      join_using_before: Присоединяйтесь к обсуждению, используя
      forum_tag: 'тег #12in23 на наших форумах'
      join_using_middle: или
      join_using_after: хэштег в социальных сетях!
      swag_note: У нас есть эксклюзивный мерч Механического марта, который появится только позже в этом месяце. Следите за магазином мерча (и загляните в мерч Функционального февраля, пока он тоже не закончился!)
      streaming_schedule_heading: Ближайшее расписание трансляций
      streaming_schedule_body: Это расписание регулярно обновляется. Все события будут транслироваться на нашем
      streaming_schedule_subscribe: '- подпишитесь, чтобы ничего не пропустить!'
      all_times_utc: Все время по UTC.
      how_does_it_work_heading: Как работает #12in23?
      how_does_it_work_body: У каждого месяца своя тема и языки. Решайте упражнения на выбранном языке в течение этого месяца. Посмотрите наши два вводных видео для подробностей!
      video_thumbnail_alt: Превью видео
      video_hows_it_going: Как продвигается ваш #12in23?
      video_official_calendar: Официальный календарь #12in23
      track_progress_note: Отслеживайте свой прогресс внизу страницы.
      donate_heading: Нравится #12in23? Поддержите нас 🙏
      donate_body: Мы делаем Exercism бесплатным, чтобы им мог пользоваться каждый. Но мы полагаемся на щедрость тех, кто может себе это позволить. Если вам нравится #12in23 и вы можете себе это позволить, пожалуйста, поддержите Exercism пожертвованием!
      donate_now: Пожертвовать
      year_long_badge_heading: Годовой значок #12in23
      year_long_badge_body: >-
        В конце года мы наградим эксклюзивным значком всех, кто выполнит все избранные упражнения в правильных парадигмах. Вы можете выполнить упражнение в любое время в течение 2023 года.
        Каждое подходящее упражнение будет показано ниже.
        Полный список правил и упражнений можно найти в
      year_long_badge_forum_post_html: <a href="%{href}">этой теме на форуме</a>.
      published_exercises: Опубликованные упражнения
      published_exercises_count: (%{count} / 10 на данный момент)
      no_valid_exercises: Подходящих упражнений не найдено.
      progress_heading: Ваш прогресс в #12in23
      progress_body: Ниже вы увидите список всех языков, которые использовали в 2023 году. Постарайтесь освоить 12 языков к концу года!
      progress_cta: Отправьте 5 упражнений (не считая "Hello World") в треке, чтобы отметить этот язык!
      completed: Выполнено
      exercises_completed: '%{count} упражнений выполнено'
      exercises_completed_of_5: '%{count} / 5 упражнений выполнено'
