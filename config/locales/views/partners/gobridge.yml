en:
  partners:
    gobridge:
      header:
        title: The official Go mentoring platform
        subtitle:
          Exercism is the official mentoring platform for GoBridge and the Go
          Developer Network.
        mentor_button: Mentor students in Go
        learn_button: Learn and get mentored in Go
      mentoring_section:
        heading: Mentoring Go on Exercism
        subheading_sm: Support others making the switch to Go
        subheading_md: Support other programmers making the switch to Go
        paragraph_1:
          Exercism is the platform for learning, practicing and mentoring
          over 55 programming languages. It's not-for-profit and 100% free.
        paragraph_2:
          As students complete coding exercises, our volunteer mentors
          provide feedback on their code, helping them discover the gaps in
          their knowledge and develop their understanding.
        paragraph_3_html:
          Mentoring is a great way to expand your own knowledge while
          helping others discover the power and joy of Go.
        button: Become a Go mentor
      learning_section:
        heading: Gain fluency in Go
        subheading: Learn and get mentored on Go-specific concepts and idioms
        paragraph_1_html:
          The Go track on Exercism has <em>%{num_concepts} concepts</em>
          to learn, along with <em>%{num_exercises} coding exercises</em> for
          you to complete. It’s a great way to pick up Go specific concepts and
          ways of working.
        paragraph_2_html:
          And better still, get mentoring from senior Go developers to
          discover your knowledge gaps and build a deep understanding of the
          language.
        button: Explore the Go track
      contributing_section:
        heading: Giving back
        subheading: Contribute to Go on Exercism
        mentor_box:
          tag: Mentor.
          title: Start mentoring Go students
        build_box:
          tag: Build.
          title: Golang has %{num_tasks} tasks available to work on
        donate_box:
          tag: Donate.
          title: Donate to help us improve the Go track
ru:
  partners:
    gobridge:
      header:
        title: Официальная платформа менторинга по Go
        subtitle:
          Exercism, официальная платформа менторинга для GoBridge и Go
          Developer Network.
        mentor_button: Стать ментором для изучающих Go
        learn_button: Учить Go и получать менторскую помощь
      mentoring_section:
        heading: Менторинг по Go на Exercism
        subheading_sm: Помогайте другим перейти на Go
        subheading_md: Помогайте другим программистам перейти на Go
        paragraph_1:
          Exercism, это платформа для изучения, практики и менторинга
          более чем по 55 языкам программирования. Она некоммерческая и на 100% бесплатная.
        paragraph_2:
          Когда студенты выполняют упражнения по программированию, наши
          менторы-волонтёры дают обратную связь по их коду, помогая находить
          пробелы в знаниях и углублять понимание.
        paragraph_3_html:
          Менторинг, это отличный способ расширить собственные знания,
          помогая другим открыть для себя силу и радость Go.
        button: Стать ментором по Go
      learning_section:
        heading: Освойте Go в совершенстве
        subheading: Изучайте концепции и идиомы Go и получайте менторскую помощь
        paragraph_1_html:
          В треке Go на Exercism есть <em>%{num_concepts} концепций</em>
          для изучения, а также <em>%{num_exercises} упражнений по программированию</em>,
          которые вам предстоит выполнить. Это отличный способ освоить специфичные
          для Go концепции и приёмы работы.
        paragraph_2_html:
          А ещё лучше, получите менторскую помощь от опытных Go-разработчиков,
          чтобы найти пробелы в знаниях и глубоко понять язык.
        button: Изучить трек Go
      contributing_section:
        heading: Отдавайте сообществу
        subheading: Вносите вклад в Go на Exercism
        mentor_box:
          tag: Ментор.
          title: Начните менторить изучающих Go
        build_box:
          tag: Создавайте.
          title: В Golang доступно %{num_tasks} задач для работы
        donate_box:
          tag: Пожертвуйте.
          title: Пожертвуйте, чтобы помочь нам улучшить трек Go
