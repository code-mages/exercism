en:
  tracks:
    about:
      header:
        title: "Want to learn and master %{track_title}?"
        subtitle_html: |
          Join Exercism’s %{track_title} Track for access to
          <em class="c-underline"><strong>%{num_exercises} exercises</strong></em>
          %{concepts_clause}
          with automatic analysis
          of your code and
          <em class="c-underline"><strong>personal mentoring</strong></em>,
          all <em class="c-underline"><strong>100% free</strong></em>.
        concepts_part_course: "grouped into %{num_concepts} %{track_title} Concepts,"
        join_track_button: "Join the %{track_title} Track"
        explore_concepts_button: "Explore concepts"
        explore_exercises_button: "Explore exercises"
        gobridge_platform_html: |
          ⭐ <span class="text-gradient">Exercism is the official GoBridge &amp; GDN mentoring platform.</span>
        learn_more_link_text: "Learn more."
      about_section:
        title: "About %{track_title}"
        read_more_button_text: "Read more on %{track_title}"
        read_less_button_text: "Read less"
      exercises_section:
        title_html: >
          <em class="c-underline">%{num_exercises} coding exercises</em>
          for %{track_title} on Exercism.%{range_part}
        range_part_present: " From %{first_exercise_title} to %{last_exercise_title}."
        subtitle: "Get better at programming through fun, rewarding coding exercises that test your understanding of concepts with Exercism."
        all_exercises_link: "See all %{track_title} exercises on Exercism"
      concepts:
        title: "A taste of the concepts you'll cover"
        see_all_concepts: "See all the concepts for %{track_title}"
      key_features:
        title: "Key Features of %{track_title}"
      upsell:
        mentoring_section:
          title: "Get mentored the %{track_title} way"
          paragraph_html: |
            Every language has its own way of doing things. %{track_title}
            is no different. Our mentors will help you learn to think like a
            %{track_title} developer and how to write idiomatic code in
            %{track_title}. Once you've solved an exercise, submit it to our
            volunteer team, and they'll give you hints, ideas, and feedback on
            how to make it feel more like what you'd normally see in
            %{track_title} - they'll help you discover the things you don't know
            that you don't know.
          learn_more: "Learn more about mentoring"
        exercises_section:
          title: "Community-sourced %{track_title} exercises"
          paragraph_html:
            one_concept: >
              The %{track_title} track on Exercism has
              %{num_concepts} concept and %{track_num_exercises} exercises to help you write better code.
            many_concepts: >
              The %{track_title} track on Exercism has
              %{num_concepts} concepts and %{track_num_exercises} exercises to help you write better code.
            no_concepts: >
              The %{track_title} track on Exercism has
              %{track_num_exercises} exercises to help you write better code.
          see_all_exercises: "See all %{track_title} exercises"
        cta:
          title: "Get started with the %{track_title} track"
          description: "The best part, it’s 100% free for everyone."
          join_button: "Join the %{track_title} track"
ru:
  tracks:
    about:
      header:
        title: "Хотите изучить и освоить %{track_title}?"
        subtitle_html: |
          Присоединяйтесь к треку %{track_title} на Exercism, чтобы получить доступ к
          <em class="c-underline"><strong>%{num_exercises} упражнениям</strong></em>
          %{concepts_clause}
          с автоматическим анализом
          вашего кода и
          <em class="c-underline"><strong>персональным менторством</strong></em>,
          и всё это <em class="c-underline"><strong>на 100% бесплатно</strong></em>.
        concepts_part_course: "сгруппированным в %{num_concepts} концепций %{track_title},"
        join_track_button: "Присоединиться к треку %{track_title}"
        explore_concepts_button: "Изучить концепции"
        explore_exercises_button: "Изучить упражнения"
        gobridge_platform_html: |
          ⭐ <span class="text-gradient">Exercism, официальная платформа менторства GoBridge &amp; GDN.</span>
        learn_more_link_text: "Узнать больше."
      about_section:
        title: "О %{track_title}"
        read_more_button_text: "Читать больше о %{track_title}"
        read_less_button_text: "Свернуть"
      exercises_section:
        title_html: >
          <em class="c-underline">%{num_exercises} упражнений по программированию</em>
          для %{track_title} на Exercism.%{range_part}
        range_part_present: " От %{first_exercise_title} до %{last_exercise_title}."
        subtitle: "Становитесь лучше в программировании с помощью увлекательных и полезных упражнений, которые проверяют ваше понимание концепций вместе с Exercism."
        all_exercises_link: "Смотреть все упражнения %{track_title} на Exercism"
      concepts:
        title: "Немного о концепциях, которые вы освоите"
        see_all_concepts: "Смотреть все концепции для %{track_title}"
      key_features:
        title: "Ключевые особенности %{track_title}"
      upsell:
        mentoring_section:
          title: "Менторство в стиле %{track_title}"
          paragraph_html: |
            У каждого языка свой подход к решению задач. %{track_title}
            не исключение. Наши менторы помогут вам научиться думать как
            разработчик на %{track_title} и писать идиоматичный код на
            %{track_title}. Как только вы решите упражнение, отправьте его нашей
            команде волонтёров, и они дадут вам подсказки, идеи и обратную связь о том,
            как сделать код более привычным для
            %{track_title}, они помогут вам открыть то, о чём вы даже не подозревали.
          learn_more: "Узнать больше о менторстве"
        exercises_section:
          title: "Упражнения %{track_title} от сообщества"
          paragraph_html:
            one_concept: >
              В треке %{track_title} на Exercism есть
              %{num_concepts} концепция и %{track_num_exercises} упражнений, которые помогут вам писать лучший код.
            many_concepts: >
              В треке %{track_title} на Exercism есть
              %{num_concepts} концепций и %{track_num_exercises} упражнений, которые помогут вам писать лучший код.
            no_concepts: >
              В треке %{track_title} на Exercism есть
              %{track_num_exercises} упражнений, которые помогут вам писать лучший код.
          see_all_exercises: "Смотреть все упражнения %{track_title}"
        cta:
          title: "Начните с трека %{track_title}"
          description: "И самое лучшее: это на 100% бесплатно для всех."
          join_button: "Присоединиться к треку %{track_title}"
