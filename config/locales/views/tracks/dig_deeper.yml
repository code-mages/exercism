en:
  tracks:
    dig_deeper:
      tooltip_locked:
        title: Struggling with this exercise?
        unlock_dig_deeper:
          Unlock the Dig Deeper tab to see how the community approached
          and solved %{exercise_title}.
        attempt_exercise_first:
          You can only view the Dig Deeper tab for this exercise
          if you've attempted this exercise at least once.
        recommendation:
          We highly recommend you try your best without exploring the Dig
          Deeper tab first.
      show:
        meta_title: Dig Deeper into %{exercise_title} in %{track_title} on Exercism
        meta_description:
          Explore different approaches and videos on how to solve
          %{exercise_title} in %{track_title}.
ru:
  tracks:
    dig_deeper:
      tooltip_locked:
        title: Возникли сложности с этим упражнением?
        unlock_dig_deeper:
          Откройте вкладку Dig Deeper, чтобы увидеть, как сообщество подошло
          к решению %{exercise_title} и справилось с ним.
        attempt_exercise_first:
          Вы можете открыть вкладку Dig Deeper для этого упражнения,
          только если попробовали решить его хотя бы один раз.
        recommendation:
          Мы настоятельно рекомендуем сначала выложиться по максимуму,
          не заглядывая во вкладку Dig Deeper.
      show:
        meta_title: Изучите %{exercise_title} глубже в %{track_title} на Exercism
        meta_description:
          Познакомьтесь с разными подходами и видео о том, как решить
          %{exercise_title} в %{track_title}.
