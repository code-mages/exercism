          introduction_heading: "Введение"
          hello_world_intro_html: "«Hello, World!» поможет вам написать немного кода на %{track_title} и познакомиться с рабочим процессом Exercism. <strong>Его выполнение открывает остальную часть трека %{track_title}.</strong>"
          watch_video_prompt: 'Посмотрите наше видео «Introduction to Hello, World», чтобы начать 👇'
          instructions_heading: "Инструкции"
          source_heading: "Источник"
          explore_source_html: >
            Изучите <a href="%{source_url}" target="_blank" rel="noopener noreferrer">источник этого упражнения</a>.
          edit_via_github: "Редактировать через GitHub"
          new_window_icon_alt: "Ссылка открывается в новом окне или вкладке"
        action_box_complete:
          tutorial:
            title: Завершите упражнение
            paragraph_1:
              Как только вы закончите с упражнением, отметьте его как выполненное. Вы
              также можете опубликовать своё решение, чтобы поделиться с другими при
              завершении упражнения.
            paragraph_2:
              Отметка Hello World как выполненного открывает первые упражнения
              трека.
          concept_exercise:
            title: Закончили с упражнением?
            paragraph_1:
              Чувствуете, что понимаете концепции, которым учит это упражнение? Отметьте
              его как выполненное, чтобы двигаться дальше.
          general:
            title: Закончили с упражнением?
            paragraph:
              Прошли это упражнение настолько, насколько хотели? Вычеркните его из своего списка и
              при желании опубликуйте своё решение, чтобы сообщество могло на нём учиться.
        concepts_section:
          learning_goals_title: Цели обучения упражнения
          learning_goals_description_html: Это обучающее упражнение помогло развить ваши знания о %{concepts}.
          unlocked_concepts:
            title: Вы разблокировали
            count:
              one: 1 концепцию
              few: "%{count} концепции"
              many: "%{count} концепций"
              other: "%{count} концепции"
          unlocked_exercises:
            title: Вы разблокировали
            count:
              one: 1 упражнение
              few: "%{count} упражнения"
              many: "%{count} упражнений"
              other: "%{count} упражнения"
        external:
          deep_dive_title: Погрузитесь глубже в %{exercise_title}!
        uncompleted_concepts_section:
          learning_goals_title: Цели обучения упражнения
          learning_goals_description: Выполняя %{exercise_title}, вы изучите
          concept_plural:
            one: 1 концепцию
            few: "%{count} концепции"
            many: "%{count} концепций"
            other: "%{count} концепции"
        action_box_join_exercism:
          title: Готовы начать %{exercise_title}?
          description_html:
            Зарегистрируйтесь в Exercism, чтобы изучить и освоить %{track_link} с
            %{concept_link}%{exercise_link} и настоящим наставничеством от живых людей,
            <strong>и всё это бесплатно.</strong>
          concept_plural:
            one: 1 концепцию
            few: "%{count} концепции"
            many: "%{count} концепций"
            other: "%{count} концепции"
          exercise_plural:
            one: 1 упражнение
            few: "%{count} упражнения"
            many: "%{count} упражнений"
            other: "%{count} упражнения"
          signup_button: Зарегистрируйтесь, это бесплатно!
          login_button: Войти в Exercism
      no_test_runner:
        editor_unavailable_title: Редактор недоступен.
        test_runner_not_working_title: Этот трек нельзя решить в редакторе Exercism
        test_runner_not_working_description_html:
          У этого трека пока нет рабочего
          средства запуска тестов, поэтому редактор отключён. Мы работаем над решением
          этой проблемы. Если вы хотите помочь, посмотрите Issues в
          %{github_link}.
        github_repo_link_text: репозитории GitHub
        editor_unsupported_title: Извините, это упражнение нельзя решить в редакторе.
        editor_unsupported_description:
          Вероятно, это потому, что запуск тестов
          для этого упражнения занимает слишком много времени. Пожалуйста, используйте свой локальный редактор, чтобы решить
          его, и загрузите через наш CLI.
        back_to_exercise_button: Назад к упражнению
      index:
        meta_title: "Упражнения %{track_title} на Exercism"
        meta_description: Изучите %{num_exercises} упражнений %{track_title} на Exercism
        external_cta:
          title: Попрактикуйтесь в %{num_exercises} упражнениях трека %{track_title}
          description:
            Изучайте и практикуйте %{track_title}, выполняя %{num_exercises}
            упражнений, которые раскрывают разные концепции и идеи.
          join_track_button: Присоединиться к треку %{track_title}
        page_header:
          title: Изучите упражнения %{track_title} на Exercism
          description:
            Открывайте больше упражнений по мере продвижения. Они отлично подходят для практики и
            их приятно выполнять!
