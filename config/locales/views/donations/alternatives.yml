en:
  donations:
    alternatives:
      heading: Looking for another payment provider?
      text_html: >
        We currently support Paypal and GitHub Sponsors as alternative
        payment providers. Please contact <a href="%{jeremy_url}">Jeremy</a>
        if there is another provider you feel we should add.
      jeremy: Jeremy
      paypal_button: Donate with Paypal
      github_sponsors_button: Donate via GitHub Sponsors
ru:
  donations:
    alternatives:
      heading: Ищете другой платёжный сервис?
      text_html: >
        Сейчас в качестве альтернативных платёжных сервисов мы поддерживаем
        Paypal и GitHub Sponsors. Свяжитесь с <a href="%{jeremy_url}">Jeremy</a>,
        если есть другой сервис, который, по вашему мнению, нам стоит добавить.
      jeremy: Jeremy
      paypal_button: Пожертвовать через Paypal
      github_sponsors_button: Пожертвовать через GitHub Sponsors
