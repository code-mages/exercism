en:
  donations:
    index:
      header:
        strong_text: "Support our goal:"
        heading: Give everyone an equal chance to learn and master programming. ✨
        paragraph_html:
          If you share our desire to make the world a better &amp; fairer
          place, please support us.<br><span class="font-medium">You can learn
          more about our %{mission_link}, %{impact_link} and
          %{team_link}.</span>
        mission: Mission
        impact: Impact
        team: Team
      progress_bar:
        monthly_donations: "Monthly donations:"
        sustainable_at: "Sustainable at:"
        target_amount: $25,000
      logged_out_form:
        heading: Please log in to donate using a debit/credit card.
        paragraph_html:
          Due to constant attacks by bots we now require that everyone
          %{login_link} or %{signup_link} before donating using a debit or
          credit card. You can still use other forms of donations below. We
          apologize for the inconvenience!
        log_in: logs in
        sign_up: signs up
      info_section:
        heading_one: Everything you need to know about donations
        paragraph_one:
          Why do we need donations? How much does Exercism cost to run? How
          do we spend donations? Watch Jeremy's explanatory video 👇
        heading_two: Here's what you can do to support us.
        donate_card:
          title: "Donate"
          description_right_html: >
            Support us financially using the donation box to the right. %{tail}
          description_above_html: >
            Support us financially using the donation box above. %{tail}
          tail_html: >
            Every dollar helps us keep us independent, advert-free and able to grow,
            so please support us if you can! 💜
        company_card:
          title: Get your company involved
          description_html:
            Does your company support not-for-profits or charities? Do you
            have a matched giving scheme at work? We'd love to chat to you to
            understand how your company could support us. Please drop us an
            email at %{email_link} and we'll explore further!
          email_address: fundraising@exercism.org
        social_card:
          title: Love Exercism? Tell others about us!
          description_html: Follow us on %{twitter_link}, %{github_link} and
            %{linkedin_link} then share our posts, and create your own! We try
            to share everything we see 🙂
ru:
  donations:
    index:
      header:
        strong_text: "Поддержите нашу цель:"
        heading: Дайте каждому равный шанс учиться и осваивать программирование. ✨
        paragraph_html:
          Если вы разделяете наше желание сделать мир лучше и
          справедливее, пожалуйста, поддержите нас.<br><span class="font-medium">Больше
          узнать о нашей %{mission_link}, %{impact_link} и
          %{team_link} можно здесь.</span>
        mission: Миссии
        impact: Влиянии
        team: Команде
      progress_bar:
        monthly_donations: "Ежемесячные пожертвования:"
        sustainable_at: "Устойчивость при:"
        target_amount: $25,000
      logged_out_form:
        heading: Пожалуйста, войдите, чтобы сделать пожертвование дебетовой или кредитной картой.
        paragraph_html:
          Из-за постоянных атак ботов мы теперь требуем, чтобы каждый
          %{login_link} или %{signup_link} перед пожертвованием дебетовой или
          кредитной картой. Вы по-прежнему можете использовать другие формы пожертвований ниже. Приносим
          извинения за неудобства!
        log_in: вошёл
        sign_up: зарегистрировался
      info_section:
        heading_one: Всё, что нужно знать о пожертвованиях
        paragraph_one:
          Зачем нам нужны пожертвования? Сколько стоит содержание Exercism? Как
          мы расходуем пожертвования? Посмотрите объясняющее видео Джереми 👇
        heading_two: Вот что вы можете сделать, чтобы поддержать нас.
        donate_card:
          title: "Пожертвовать"
          description_right_html: >
            Поддержите нас финансово через блок пожертвований справа. %{tail}
          description_above_html: >
            Поддержите нас финансово через блок пожертвований выше. %{tail}
          tail_html: >
            Каждый доллар помогает нам оставаться независимыми, без рекламы и расти,
            поэтому, пожалуйста, поддержите нас, если можете! 💜
        company_card:
          title: Привлеките свою компанию
          description_html:
            Ваша компания поддерживает некоммерческие организации или благотворительность? Есть
            ли у вас на работе программа совместных пожертвований? Мы будем рады пообщаться с вами, чтобы
            понять, как ваша компания могла бы нас поддержать. Напишите нам на
            почту %{email_link}, и мы всё обсудим подробнее!
          email_address: fundraising@exercism.org
        social_card:
          title: Любите Exercism? Расскажите о нас другим!
          description_html: Подписывайтесь на нас в %{twitter_link}, %{github_link} и
            %{linkedin_link}, делитесь нашими постами и создавайте свои! Мы стараемся
            делиться всем, что видим 🙂
