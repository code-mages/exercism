en:
  localization:
    translators:
      new:
        hero:
          title: Exercism in Your Language
          subtitle_html: We're translating Exercism into <strong>all the
            languages</strong> and we <strong>need your help!</strong>
          description:
            If you'd like to help translate Exercism into the language(s) you
            know, please fill out the form below and we'll be in touch in the
            next couple of weeks with details!
        call_to_action:
          join_team_signed_out: Join the Team!
          login_prompt_html:
            To help in our translation project, please log into Exercism
            (or create an account if you're new around here!)
          log_in_button: Log In
          sign_up_button: Sign Up
          join_team_signed_in: Join the Team!
          choose_languages_description: Choose up to 5 languages that you want to help translate.
        form:
          signed_up_title: You're signed up to be a translator!
          signed_up_description_html:
            <strong>Thank you! We'll be in touch soon!</strong>
            These are the languages which you've signed up to translate Exercism
            into.
          select_language_prompt_first: Please select at least one language...
          update_languages_button: Update your languages
          become_translator_button: Become a translator!
        faq:
          title: FAQs
          what_it_involves_question: What does being a translator involve?
          what_it_involves_answer:
            Translators will help us translate the Exercism
            website, documentation, and other content into their chosen
            languages. This will involve translating text, reviewing
            translations, and ensuring that the content is culturally
            appropriate and accurate. We are generating machine translations
            first then asking translators to review and improve them.
          time_commitment_question: How much time will it take?
          time_commitment_answer:
            You can spend as much time as you're willing to give to
            the project. We are hoping to build large teams of translators for
            each language, who can work together to quickly give us a great
            first version.
          payment_reward_question: Is there any payment or reward?
          payment_reward_answer_html:
            All of Exercism's content is created by volunteers
            who give their time to help others. Like other parts of the site,
            there is no financial reward for helping, but you will
            <strong>receive Exercism Reputation</strong> which boosts your
            public profile!
          when_start_question: When do we start?
          when_start_answer:
            Soon! We're currently finishing building the UI you'll use,
            and creating our initial machine-translations. We hope to be ready
            near the start of September for you!
ru:
  localization:
    translators:
      new:
        hero:
          title: Exercism на вашем языке
          subtitle_html: Мы переводим Exercism на <strong>все языки</strong>,
            и нам <strong>нужна ваша помощь!</strong>
          description:
            Если вы хотите помочь перевести Exercism на язык (или языки),
            которые вы знаете, пожалуйста, заполните форму ниже, и мы свяжемся
            с вами в ближайшие пару недель с подробностями!
        call_to_action:
          join_team_signed_out: Присоединиться к команде!
          login_prompt_html:
            Чтобы помочь с нашим проектом перевода, пожалуйста, войдите в Exercism
            (или создайте аккаунт, если вы здесь впервые!)
          log_in_button: Войти
          sign_up_button: Зарегистрироваться
          join_team_signed_in: Присоединиться к команде!
          choose_languages_description: Выберите до 5 языков, с переводом на которые вы хотите помочь.
        form:
          signed_up_title: Вы записаны в переводчики!
          signed_up_description_html:
            <strong>Спасибо! Мы скоро свяжемся с вами!</strong>
            Это языки, на перевод Exercism на которые вы записались.
          select_language_prompt_first: Пожалуйста, выберите хотя бы один язык...
          update_languages_button: Обновить ваши языки
          become_translator_button: Стать переводчиком!
        faq:
          title: Частые вопросы
          what_it_involves_question: Что входит в обязанности переводчика?
          what_it_involves_answer:
            Переводчики помогут нам перевести сайт Exercism,
            документацию и другой контент на выбранные ими языки. Это
            включает перевод текста, проверку переводов и обеспечение того,
            чтобы контент был культурно уместным и точным. Сначала мы
            создаём машинные переводы, а затем просим переводчиков проверить
            и улучшить их.
          time_commitment_question: Сколько времени это займёт?
          time_commitment_answer:
            Вы можете уделять проекту столько времени, сколько
            готовы. Мы надеемся собрать большие команды переводчиков для
            каждого языка, которые смогут работать вместе, чтобы быстро дать
            нам отличную первую версию.
          payment_reward_question: Есть ли оплата или вознаграждение?
          payment_reward_answer_html:
            Весь контент Exercism создаётся волонтёрами,
            которые тратят своё время, чтобы помогать другим. Как и в других
            частях сайта, за помощь нет финансового вознаграждения, но вы
            <strong>получите репутацию Exercism</strong>, которая повысит ваш
            публичный профиль!
          when_start_question: Когда мы начинаем?
          when_start_answer:
            Скоро! Сейчас мы заканчиваем создание интерфейса, которым вы
            будете пользоваться, и готовим наши первоначальные машинные
            переводы. Мы надеемся быть готовы к началу сентября для вас!
