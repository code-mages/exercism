    errors:
      messages:
        # Common error messages
        invalid_request:
          unknown: "В запросе отсутствует обязательный параметр, содержится недопустимое значение параметра либо запрос сформирован некорректно."
          missing_param: "Отсутствует обязательный параметр: %{value}."
          request_not_authorized: "Запрос должен быть авторизован. Обязательный параметр для авторизации запроса отсутствует или недействителен."
          invalid_code_challenge: "Требуется code challenge."
        invalid_redirect_uri: "Запрошенный URI перенаправления сформирован некорректно или не соответствует URI перенаправления клиента."
        unauthorized_client: "Клиент не авторизован для выполнения этого запроса данным методом."
        access_denied: "Владелец ресурса или сервер авторизации отклонил запрос."
        invalid_scope: "Запрошенная область доступа недействительна, неизвестна или сформирована некорректно."
