          one: "Значение code_challenge_method должно быть %{challenge_methods}."
          few: "Значение code_challenge_method должно быть одним из %{challenge_methods}."
          many: "Значение code_challenge_method должно быть одним из %{challenge_methods}."
          other: "Значение code_challenge_method должно быть одним из %{challenge_methods}."
        server_error: "Сервер авторизации столкнулся с непредвиденным состоянием, которое помешало ему выполнить запрос."
        temporarily_unavailable: "Сервер авторизации в настоящее время не может обработать запрос из-за временной перегрузки или технического обслуживания сервера."

        # Configuration error messages
        credential_flow_not_configured: "Поток Resource Owner Password Credentials не выполнен, так как Doorkeeper.configure.resource_owner_from_credentials не настроен."
        resource_owner_authenticator_not_configured: "Поиск владельца ресурса не выполнен, так как Doorkeeper.configure.resource_owner_authenticator не настроен."
        admin_authenticator_not_configured: "Доступ к панели администратора запрещён, так как Doorkeeper.configure.admin_authenticator не настроен."

        # Access grant errors
        unsupported_response_type: "Сервер авторизации не поддерживает этот тип ответа."
        unsupported_response_mode: "Сервер авторизации не поддерживает этот режим ответа."

        # Access token errors
        invalid_client: "Аутентификация клиента не удалась из-за неизвестного клиента, отсутствия аутентификации клиента или неподдерживаемого метода аутентификации."
        invalid_grant: "Предоставленный грант авторизации недействителен, истёк, отозван, не соответствует URI перенаправления, использованному в запросе авторизации, или был выдан другому клиенту."
        unsupported_grant_type: "Тип гранта авторизации не поддерживается сервером авторизации."

        invalid_token:
          revoked: "Токен доступа был отозван"
          expired: "Срок действия токена доступа истёк"
          unknown: "Токен доступа недействителен"
        revoke:
          unauthorized: "У вас нет прав на отзыв этого токена"

        forbidden_token:
          missing_scope: 'Для доступа к этому ресурсу требуется область "%{oauth_scopes}".'

    flash:
      applications:
        create:
          notice: "Приложение создано."
        destroy:
          notice: "Приложение удалено."
        update:
          notice: "Приложение обновлено."
      authorized_applications:
        destroy:
          notice: "Приложение отозвано."

    layouts:
      admin:
        title: "Doorkeeper"
        nav:
          oauth2_provider: "Провайдер OAuth2"
          applications: "Приложения"
          home: "Главная"
      application:
